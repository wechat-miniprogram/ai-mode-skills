    const fmtMs=v=>v==null?'-':v;
    if(tools.length){
      html+=`<div class="perf-section"><h3>本次评测覆盖的接口详情</h3><table class="perf-table"><thead><tr><th>接口名</th><th class="num">调用次数</th><th class="num">覆盖用例</th><th class="num">占比</th><th class="num">数据大小<br><small style="font-weight:normal;opacity:.7">最大 / 均值</small></th><th class="num">耗时(ms)<br><small style="font-weight:normal;opacity:.7">最大 / 均值</small></th></tr></thead><tbody>
        ${tools.map(t=>{
          const inAll=cov.total_apis>0&&![...cov.uncovered].includes(t.name);
          const nameStyle=inAll?'':'color:#999;';
          const perf=perfMap[t.name];
          const sizeCell=perf?`<span style="color:${sizeColor(perf.max_bytes||0)}"><b>${fmtNum(perf.max_bytes)}</b></span> / ${fmtNum(perf.avg_bytes)}`:'-';
          const msCell=perf?`<span style="color:${msColor(perf.max_ms||0)}"><b>${fmtMs(perf.max_ms)}</b></span> / ${fmtMs(perf.avg_ms)}`:'-';
          return `<tr><td><b style="${nameStyle}">${h(t.name)}</b>${inAll?'':' <span style="font-size:10px;color:#bbb">(非API全集)</span>'}</td><td class="num"><b>${t.calls}</b></td><td class="num">${t.case_count}/${totalCases}</td><td class="num">${t.pct}%</td><td class="num">${sizeCell}</td><td class="num">${msCell}</td></tr>`;
        }).join('')}
      </tbody></table></div>`;
    }

    // 未覆盖接口列表
    if(cov.uncovered.length){
      html+=`<div class="perf-section"><h3>本次评测未覆盖到的接口（${cov.uncovered.length}）</h3>
        <div style="display:flex;flex-wrap:wrap;gap:6px;padding:4px 0">
          ${cov.uncovered.map(n=>`<span style="display:inline-block;padding:4px 10px;background:#fff1f0;color:#cf1322;border-radius:4px;font-size:12px;border:1px solid #ffa39e">${h(n)}</span>`).join('')}
        </div>
      </div>`;
    }

    el.innerHTML=html;
  }

  // ── 渲染 Case 列表（左侧栏）──
  function renderCaseList(){
    document.getElementById('skillNameLabel').textContent=parseSkillName();
  renderMiniappInfo();
  renderRunSkillsInfo();
    const list=document.getElementById('caseList');
    const sortedIndices=sortedCaseIndices();

    // 渲染**所有** case（含失败/未完成），编号一律用 c.idx —— 与任务侧 case 编号永远对齐。
    // 失败/未完成 case 标 .incomplete（灰色），但仍可点击查看已采集的部分数据；
    // .fail 仅用于"完成评测但有缺陷"的红橙警示，与"流程未跑完"语义不同。
    list.innerHTML=sortedIndices.map(i=>{
      const c=cases[i];
      const isVisible=caseIsVisible(c);
      const failedCount=isVisible?caseFailedCount(c):0;
      const hasIssue=failedCount>0;
      const cls=isVisible?(hasIssue?' fail':''):' incomplete';
      const title=c.gen_trajectory?.brief_title||c.gen_intent?.brief_title||'';
      const expandTag=caseHasExpand(c)?'<span class="tag-expand">负例-边界测试</span>':'';
      const rateHtml=!isVisible
        ?`<span class="rate" title="该 case 流程未完整跑完">⚠ 未完成</span>`
        :hasIssue
          ?`<span class="rate">✗ ${failedCount}</span>`
          :`<span class="rate">✓</span>`;
      return `<div class="case-item${cls}${i===currentIdx?' active':''}" data-idx="${i}">
        <div class="left">
          <span class="dot"></span>
          <span class="label">Case ${c.idx}${title?' · '+h(title):''}${expandTag}</span>
        </div>
        <div class="right">
          ${rateHtml}
        </div>
      </div>`;
    }).join('');

    list.addEventListener('click',e=>{
      const el=e.target.closest('.case-item');
      if(!el)return;
      const i=Number(el.dataset.idx);
      // .active toggle 与右侧渲染由 showCaseDetail → navigateToCase → renderForCurrentHash 统一处理。
      showCaseDetail(i);
    });
  }

  // ── 渲染用例详情（右侧，与任务总览互斥）──
  function renderCaseDetail(){
    const c=cases[currentIdx];
    const evalResult=c.eval?.eval_result||{};
    const attr=c.attribution?.attribution||{};
    const trajectory=c.gen_trajectory?.trajectory||[];
    const checklist=c.gen_checklist?.checklist||[];
    // 仅展示过滤后的 checklist（截断 L4/L2 之后）
    const items=caseVisibleEvalItems(c);
    const attrItems=getVisibleAttrItems(c);
    const failedChecks=caseFailedChecks(c);
    const totalChecks=caseTotalChecks(c);
    const failedCount=caseFailedCount(c);
    const l3Items=[];  // L4 不再展示
    const snapshotPrefix=buildSnapshotPrefix(c.idx);

    // 构建 evidence_indices -> 失败checklist 的映射
    const failedMerged=failedChecks.map(fc=>{
      const ck=checklist.find(c=>(typeof c.index==='number'?c.index:(checklist.indexOf(c)+1))===fc.step_index)||{};
      return {...fc, evidence:ck.evidence||''};
    });
    // evidence_indices -> 失败 check 列表映射（挂在最后一个 evidence index 上）
    const trajIdxToIssues=new Map();
    failedMerged.forEach(fc=>{
      const indices=fc.evidence_indices||[];
      if(indices.length){
        const lastIdx=indices[indices.length-1];
        if(!trajIdxToIssues.has(lastIdx))trajIdxToIssues.set(lastIdx,[]);
        trajIdxToIssues.get(lastIdx).push(fc);
      }
    });
    // step_index -> attribution 映射
    const stepToAttr=new Map();
    attrItems.forEach(ai=>{stepToAttr.set(ai.step_index,ai)});
    // attribution evidence_indices -> attribution item 映射（挂在最后一个 evidence index 上）
    const trajIdxToAttr=new Map();
    attrItems.forEach(ai=>{
      const indices=ai.evidence_indices||[];
      if(indices.length){
        const lastIdx=indices[indices.length-1];
        if(!trajIdxToAttr.has(lastIdx))trajIdxToAttr.set(lastIdx,[]);
        trajIdxToAttr.get(lastIdx).push(ai);
      }
    });
    // L3 evidence_indices -> 轨迹索引映射（挂在最后一个 evidence index 上）
    const trajIdxToL3=new Map();
    l3Items.forEach(ai=>{
      const indices=ai.evidence_indices||[];
      if(indices.length){
        const lastIdx=indices[indices.length-1];
        if(!trajIdxToL3.has(lastIdx))trajIdxToL3.set(lastIdx,[]);
        trajIdxToL3.get(lastIdx).push(ai);
      }
    });

    // 详情区编号一律用 c.idx —— 与任务侧 / 左侧列表 / hash (#case-N) 三处对齐
    const caseTitle=c.gen_trajectory?.brief_title||c.gen_intent?.brief_title||'';
    const expandTagDetail=caseHasExpand(c)?'<span class="tag-expand">负例-边界测试</span>':'';
    // 不完整 case 在标题区用文字标记，让用户立即知道为什么没有评分/归因
    const incompleteTag=!caseIsVisible(c)
      ?'<span class="tag-expand" style="background:#f0f0f0;color:#8c8c8c;border-color:#d9d9d9">⚠ 未完成</span>'
      :'';

    let html=`
      <div class="case-detail-header">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="back-btn" id="backToOverview">← 返回总览</button>
          <h2>Case ${c.idx}${caseTitle?' · '+h(caseTitle):''}${expandTagDetail}${incompleteTag}</h2>
        </div>
        <div style="display:flex;align-items:center;gap:8px;font-size:12px">
          ${(()=>{
            const dist=c.tool_calls_by_skill;
            if(!dist||!dist.total) return '';
            const skills=Array.isArray(dist.unique_skills)?dist.unique_skills:[];
            const parts=Object.entries(dist.counts||{}).filter(([k])=>k!=='__unknown__').map(([k,v])=>`${h(k)} ${v}`).join(' · ');
            const tip=parts||'无';
            return `<span style="padding:3px 10px;border-radius:12px;background:#f0f5ff;color:#2f54eb;border:1px solid #adc6ff" title="${h(tip)}">🔧 ${dist.total} 次 · ${skills.length} 个 skill</span>`;
          })()}
          <span style="padding:3px 10px;border-radius:12px;font-weight:600;${failedCount>0?'background:#fff2e8;color:#fa541c;border:1px solid #ffbb96':'background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f'}">
            ${failedCount>0?`✗ checklist 错误 ${failedCount}/${totalChecks}`:`✓ checklist 全通过（${totalChecks}）`}
          </span>
        </div>
      </div>
      <div class="case-detail-body">
        <div class="case-col-eval">`;

    // Debug 模式：呈现 intent 信息
    if(c.view?.debug){
      const intentStr=c.gen_intent?.intent||'';
      const isExpand=caseHasExpand(c);
      const expandEnts=isExpand?caseExpandedEntities(c):[];
      if(intentStr){
        html+=`<div style="margin-bottom:12px;padding:12px 16px;background:#e6f7ff;border:1px solid #91d5ff;border-radius:8px">
          <h4 style="font-size:13px;font-weight:600;color:#1890ff;margin:0 0 6px 0">🔍 Intent（Debug）</h4>
          <div style="font-size:12px;color:#333;line-height:1.6;white-space:pre-wrap">${h(intentStr)}</div>`;
        if(isExpand&&expandEnts.length){
          html+=`<div style="margin-top:8px;padding-top:8px;border-top:1px dashed #91d5ff">
            <span style="font-size:12px;font-weight:600;color:#fa541c">⚠️ 边界实体：</span>
            <span style="font-size:12px;color:#fa541c">${expandEnts.map(e=>'「'+h(e.identifier||'?')+'」('+h(e.type||'?')+')').join('、')}</span>
          </div>`;
        }
        html+=`</div>`;
      }
    }

    // Skill 缺陷
    if(attrItems.length){
      html+=`<div class="attr-summary-bar"><h4>⚠️ Skill 缺陷（${attrItems.length}）</h4><div class="attr-summary-list">`;
      attrItems.forEach((ai,aiIdx)=>{
        const stepIdx=ai.step_index;
        const titleText=h(ai.brief||ai.description||'');
        const titleHtml=stepIdx!=null
          ?`<a href="javascript:void(0)" onclick="var el=document.getElementById('attr-step-${stepIdx}');if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.boxShadow='0 0 0 3px #ff9500';el.style.borderColor='#ff9500';setTimeout(()=>{el.style.boxShadow='';el.style.borderColor='#f0f0f0'},2500)}" style="font-size:13px;font-weight:600;color:#1890ff;text-decoration:none;cursor:pointer;border-bottom:1px dashed #1890ff">${titleText} ↗</a>`
          :`<span style="font-size:13px;font-weight:600;color:#333">${titleText}</span>`;
        html+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid #f0f0f0;border-radius:8px;margin-bottom:8px">
          <span class="attr-badge ${h(ai.level)}" data-tip="${h(levelDesc(ai.level))}" style="cursor:help">${levelName(ai.level)}</span>
          ${titleHtml}
        </div>`;
      });
      html+=`</div></div>`;
    }

    if(!attrItems.length){
      html+=`<div style="margin-bottom:16px;padding:12px 16px;background:#f6ffed;border:1px solid #b7eb8f;border-radius:8px">
        <h4 style="font-size:13px;font-weight:600;color:#52c41a;margin:0">✅ Skill 缺陷（0）</h4>
      </div>`;
    }

    // Checklist 列表（过滤后）
    html+=renderChecklistSection(c, items, checklist);

    // 关闭左列，插入拖动分割条，打开右列
    html+=`</div><div class="split-handle" id="splitHandle"></div><div class="case-col-traj">`;

    // 轨迹主体（内联问题标注）
    // 记录已渲染过的 step_index，避免同一个 checklist 在多个轨迹位置重复呈现
    const renderedStepIndices=new Set();
    if(!trajectory.length){
      html+='<div class="empty">暂无对话轨迹</div>';
    } else {
      html+='<div class="conv-list">';
      const rendered=new Set();
      // 工具调用质量判定（callStatus）查找表：key=`${msgIdx}:${tcIdx}` → { status, reason }
      const callStatusByKey=new Map();
      (c.view?.call_statuses||[]).forEach(cs=>{
        callStatusByKey.set(`${cs.msgIdx}:${cs.tcIdx}`,{status:cs.status,reason:cs.reason||''});
      });
      const renderCallStatusBadge=(mi,tcIdx)=>{
        const cs=callStatusByKey.get(`${mi}:${tcIdx}`);
        if(!cs) return ''; // 旧 trajectory 没有 callStatus，不显示徽章
        if(cs.status==='ok'){
          return `<span class="conv-call-ok-badge" title="工具调用：成功">工具调用：成功</span>`;
        }
        // 折叠所有空白（含 \n / \r / \t）为单个空格，避免 title 渲染出多行
        const reason=h(String(cs.reason||cs.status).replace(/\s+/g,' ').trim());
        return `<span class="conv-call-fail-badge" title="${reason}">工具调用：失败</span>`;
      };
      trajectory.forEach((msg,mi)=>{
        if(rendered.has(mi)) return;
        const role=msg.role||'unknown';

        // 合并 tool_calls(assistant) + tool response 为一个 box
        if(msg.tool_calls&&msg.tool_calls.length){
          // assistant 消息带 tool_calls，找后续对应的 tool 返回
          let body='';
          const mergedIndices=[]; // 被合并的 tool response 索引
          if(msg.content) body+=`<div class="conv-text">${h(msg.content)}</div>`;
          msg.tool_calls.forEach((tc,tcIdx)=>{
            const fn=tc.function||tc;
            const callId=tc.id||'';
            // 查找对应 tool response
            let toolResp=null;
            let toolRespIdx=null;
            // 严格 id 匹配窗口：±10 步（与 call_status.js findResponseForCall 一致，保证徽章与卡片配对相同）
            for(let j=mi+1;j<trajectory.length&&j<=mi+10;j++){
              if(trajectory[j].role==='tool'&&(trajectory[j].tool_call_id===callId||(!callId&&trajectory[j].role==='tool'))){
                toolResp=trajectory[j];
                toolRespIdx=j;
                rendered.add(j);
                break;
              }
            }
            // 没按 id 匹配到就按顺序取下一个 tool
            if(!toolResp){
              for(let j=mi+1;j<trajectory.length;j++){
                if(trajectory[j].role==='tool'&&!rendered.has(j)){
                  toolResp=trajectory[j];
                  toolRespIdx=j;
                  rendered.add(j);
                  break;
                }
              }
            }
            if(toolRespIdx!=null) mergedIndices.push(toolRespIdx);
            const args=fn.arguments||'';
            const respContent=toolResp?(typeof toolResp.content==='string'?toolResp.content:JSON.stringify(toolResp.content,null,2)):'';
            const respFull=(!isEmptyStructuredContent(toolResp?.structuredContent))?(typeof toolResp.structuredContent==='string'?toolResp.structuredContent:JSON.stringify(toolResp.structuredContent,null,2)):'';
            const argsP=jsonPretty(args);
            const respP=jsonPretty(respContent);
            const isErr=toolResp?.isError;
            const tsStr=fmtTs(msg.ts||toolResp?.ts);
            const detailData=JSON.stringify({name:fn.name||'',reqTime:fmtTs(msg.ts),args:argsP||args,respTime:fmtTs(toolResp?.ts),response:respContent,structuredContent:respFull}).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
            body+=`<div class="conv-tool-box${isErr?' tool-error':''}">
              <div class="conv-tool-box-header">⚡ 调用接口 <strong>${h(fn.name||'')}</strong><button class="conv-tool-def-btn" data-tool-name="${h(fn.name||'')}">📖 定义</button><button class="conv-tool-detail-btn" data-tool-detail="${detailData}">📋 详情</button>${renderCallStatusBadge(mi,tcIdx)}${isErr?'<span class="conv-tool-error-badge">返回结果: Error</span>':'<span class="conv-tool-success-badge">返回结果: Success</span>'}${tsStr?`<span class="conv-tool-time">🕐 ${tsStr}</span>`:''}</div>
              ${renderToolSection('📥 输入参数',argsP)}
              ${renderToolSection('📤 输出参数',respP)}
              ${(toolResp?.snapshot_data_url||toolResp?.snapshot_path)?`<img class="conv-snapshot" src="${h(toolResp.snapshot_data_url||snapshotPrefix+toolResp.snapshot_path)}" alt="快照" onerror="this.outerHTML='<span class=&quot;conv-snapshot-fallback&quot;>截图缺失</span>'">`:''}
              ${toolResp?.element_tree?`<details class="conv-etree"><summary>元素树</summary><pre>${h(toolResp.element_tree)}</pre></details>`:''}
            </div>`;
          });

          // 渲染归因：本索引 + 被合并的 tool response 索引
          let inlineAttr=renderInlineChecklist(mi,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices);
          mergedIndices.forEach(idx=>{
            inlineAttr+=renderInlineChecklist(idx,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices);
          });
          // fallback: 如果归因挂在紧跟的下一条(如 assistant 回复 #mi+tool_calls.length+1)但该条还未渲染
          const nextIdx=mi+msg.tool_calls.length+1;
          if(!inlineAttr && nextIdx<trajectory.length && !rendered.has(nextIdx)){
            inlineAttr=renderInlineChecklist(nextIdx,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices);
          }

          // 为被合并的 tool response 索引插入隐藏锚点，使跳转可定位
          const mergedAnchors=mergedIndices.map(idx=>`<span id="traj-${idx}"></span>`).join('');
          html+=`<div class="conv-item role-tool" id="traj-${mi}">
            ${mergedAnchors}
            <div class="conv-role tool">Tool Call <span style="color:#ccc;font-size:10px;font-weight:400">#${mi}</span></div>
            ${body}
            ${inlineAttr}
          </div>`;
          return;
        }

        // 独立的 tool response（未被合并的情况）
        if(role==='tool'){
          const isErr=msg.isError;
          let body='';
          if(isErr) body+=`<div class="conv-tool-error-badge" style="margin-bottom:6px">返回结果: Error</div>`;
          else body+=`<div class="conv-tool-success-badge" style="margin-bottom:6px">返回结果: Success</div>`;
          if(!isEmptyStructuredContent(msg.structuredContent)){
            const smry=typeof msg.content==='string'?msg.content:JSON.stringify(msg.content,null,2);
            const full=typeof msg.structuredContent==='string'?msg.structuredContent:JSON.stringify(msg.structuredContent,null,2);
            body+=`<div class="conv-text">${h(smry)}</div>
              <details class="tool-full-output"><summary>查看完整输出</summary><pre class="tool-raw">${h(full)}</pre></details>`;
          } else {
            const content=typeof msg.content==='string'?msg.content:JSON.stringify(msg.content,null,2);
            body+=`<div class="conv-text">${renderContent(content)}</div>`;
          }
          if(msg.snapshot_data_url||msg.snapshot_path){
            const src=msg.snapshot_data_url||snapshotPrefix+msg.snapshot_path;
            body+=`<img class="conv-snapshot" src="${h(src)}" alt="快照" onerror="this.outerHTML='<span class=&quot;conv-snapshot-fallback&quot;>截图缺失</span>'">`;
          }
          if(msg.element_tree){
            body+=`<details class="conv-etree"><summary>元素树</summary><pre>${h(msg.element_tree)}</pre></details>`;
          }
          html+=`<div class="conv-item role-tool${isErr?' tool-error-item':''}" id="traj-${mi}" ${isErr?'style="border-left:3px solid #ff4d4f"':''}>
            <div class="conv-role tool">tool${msg.tool_call_id?' (response)':''} <span style="color:#ccc;font-size:10px;font-weight:400">#${mi}</span></div>
            ${body}
            ${renderInlineChecklist(mi,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices)}
          </div>`;
          return;
        }

        // 普通 assistant 消息（无 tool_calls）
        if(role==='assistant'){
          const content=typeof msg.content==='string'?msg.content:JSON.stringify(msg.content,null,2);
          // partial 占位：CLI 内层超时但已有 peek 事件，单独以橙色警告样式呈现
          if(msg.partial){
            const m=msg.partial_meta||{};
            const reason=m.reason||'timeout';
            const tm=m.timeout_ms?` · ${m.timeout_ms}ms`:'';
            const stat=`已收集事件: tool=${m.peek_tool_count||0} · resp=${m.peek_response_chars||0}字 · raw=${m.peek_raw_events||0}`;
            html+=`<div class="conv-item role-assistant role-partial" id="traj-${mi}">
              <div class="conv-role assistant" style="color:#fa8c16">⚠️ Agent 超时(partial) <span style="color:#ccc;font-size:10px;font-weight:400">#${mi}</span></div>
              <div class="conv-text" style="color:#fa8c16">${h(reason)}${h(tm)}</div>
              <div class="conv-text" style="color:#999;font-size:11px;margin-top:4px">${h(stat)}</div>
              <div class="conv-text" style="color:#bfbfbf;font-size:11px;margin-top:2px">${h(content)}</div>
              ${renderInlineChecklist(mi,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices)}
            </div>`;
            return;
          }
          let body=`<div class="conv-text">${renderContent(content)}</div>`;

          html+=`<div class="conv-item role-assistant" id="traj-${mi}">
            <div class="conv-role assistant">Assistant <span style="color:#ccc;font-size:10px;font-weight:400">#${mi}</span></div>
            ${body}
            ${renderInlineChecklist(mi,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices)}
          </div>`;
          return;
        }

        // user 消息
        const content=typeof msg.content==='string'?msg.content:JSON.stringify(msg.content,null,2);
        let body=`<div class="conv-text">${renderContent(content)}</div>`;
        const avatarSvg=`<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>`;
        html+=`<div class="conv-item role-user" id="traj-${mi}">
          <div class="conv-avatar">${avatarSvg}</div>
          <div class="conv-body">
            <div class="conv-role user">User <span style="color:#ccc;font-size:10px;font-weight:400">#${mi}</span></div>
            ${body}
          </div>
        </div>`;
      });
      html+='</div>';
    }

    // 关闭右列和 body 容器
    html+=`</div></div>`;

    document.getElementById('caseDetail').innerHTML=html;

    // 返回总览按钮
    document.getElementById('backToOverview').addEventListener('click',()=>showOverview());

    // ── 拖动分割条逻辑 ──
    const splitHandle=document.getElementById('splitHandle');
    if(splitHandle){
      const body=splitHandle.parentElement;
      const evalCol=body.querySelector('.case-col-eval');
      let startX,startW;
      const onMouseMove=(e)=>{
        const dx=e.clientX-startX;
        const newW=Math.min(Math.max(startW+dx,200),body.clientWidth*0.7);
        evalCol.style.width=newW+'px';
      };
      const onMouseUp=()=>{
        splitHandle.classList.remove('dragging');
        document.removeEventListener('mousemove',onMouseMove);
        document.removeEventListener('mouseup',onMouseUp);
        document.body.style.cursor='';
        document.body.style.userSelect='';
      };
      splitHandle.addEventListener('mousedown',(e)=>{
        e.preventDefault();
        startX=e.clientX;
        startW=evalCol.offsetWidth;
        splitHandle.classList.add('dragging');
        document.body.style.cursor='col-resize';
        document.body.style.userSelect='none';
        document.addEventListener('mousemove',onMouseMove);
        document.addEventListener('mouseup',onMouseUp);
      });
    }
  }

  function scoreTag(score,max){
    if(score==null) return '<span class="score-tag">-</span>';
    const cls=score>=max?'full':score>0?'half':'zero';
    return `<span class="score-tag ${cls}">${score}/${max}</span>`;
  }

  // ── 左侧栏：小程序信息 + skill 接口列表 ──
  function renderMiniappInfo(){
    const box=document.getElementById('miniappInfo');
    if(!box) return;
    const project=D.project||{};
    // 小程序名称：优先 project.miniapp_name → start.adapter_config.miniapp_name → project_name → 未知
    const miniappName=project.miniapp_name||start.adapter_config?.miniapp_name||start.miniapp_name||project.project_name||start.project_name||'未知小程序';
    const appId=project.appid||start.adapter_config?.appid||start.appid||'';
    const skillPkgName=parseSkillName();
    // 接口列表：从 start.api_docs 取真实 API 名（这才是用户视角下的 skill 能力，如 searchCity / getCurrentWeather）
    const apiDocs=Array.isArray(start.api_docs)?start.api_docs:[];
    const apis=apiDocs.map(a=>({
      name:a.name||'',
      desc:a.description||''
    })).filter(a=>a.name);
    const apisHtml=apis.length
      ? apis.map(a=>`<div class="mi-skill-item" title="${h(a.desc||a.name)}">
          <span class="mi-skill-dot"></span>
          <span class="mi-skill-name">${h(a.name)}</span>
        </div>`).join('')
      : `<div class="mi-skill-item" style="color:#999"><span class="mi-skill-name">暂无接口信息</span></div>`;
    box.innerHTML=`
      <div class="mi-row">
        <span class="mi-label">小程序：</span>
        <span class="mi-val">${h(miniappName)}</span>
      </div>
      ${appId?`<div class="mi-row">
        <span class="mi-label">AppID：</span>
        <span class="mi-val mi-mono" title="${h(appId)}">${h(appId)}</span>
      </div>`:''}
      ${skillPkgName?``:''}
      <div class="mi-skills">
        <div class="mi-skills-title" onclick="this.nextElementSibling.classList.toggle('collapsed');this.querySelector('.mi-toggle').classList.toggle('collapsed')">
          <span>本次评测 Skill（${apis.length}）</span>
          <span class="mi-toggle collapsed">▼</span>
        </div>
        <div class="mi-skill-list collapsed">${apisHtml}</div>
      </div>`;
  }

  // ── multi-skill run 总览：参与 skills / 排除 skills / 跨 skill case 数 ──
  function renderRunSkillsInfo(){
    const box=document.getElementById('runSkillsInfo');
    if(!box) return;
    const run=D.run||{};
    const participating=Array.isArray(run.participating_skills)?run.participating_skills:[];
    if(participating.length<=1) return; // 单 skill 不展示
    const excluded=Array.isArray(run.excluded_skills)?run.excluded_skills:[];
    const breakdown=run.skill_breakdown||{};
    const perCalls=breakdown.per_skill_calls||{};
    const callsHtml=participating.map(name=>{
      const cnt=perCalls[name]||0;
      return `<span class="mi-skill-item"><span class="mi-skill-dot"></span><span class="mi-skill-name">${h(name)}</span><span style="color:#666;font-size:11px">${cnt} 次</span></span>`;
    }).join('');
    const excludedHtml=excluded.length
      ? `<div class="mi-row"><span class="mi-label">已剔除：</span><span class="mi-val" style="color:#fa541c">${excluded.map(h).join('、')}</span></div>`
      : '';
    const cross=breakdown.cross_skill_cases||0;
    const total=breakdown.total_cases||0;
    box.style.display='block';
    box.innerHTML=`
      <div class="mi-row"><span class="mi-label">参与 Skills：</span><span class="mi-val">${participating.length} 个</span></div>
      <div class="mi-row"><span class="mi-label">跨 Skill 调用 case：</span><span class="mi-val">${cross}/${total}</span></div>
      ${excludedHtml}
      <div class="mi-skills">
        <div class="mi-skills-title"><span>各 Skill 工具调用</span></div>
        <div class="mi-skill-list" style="flex-direction:row;flex-wrap:wrap;gap:6px">${callsHtml}</div>
      </div>`;
  }

  // ── 多 skill 切换 ──
  function renderSkillSwitcher(){
    const allSkills=Array.isArray(D.skills)?D.skills:[];
    const topSummary=D.summary||{};
    if(allSkills.length>1){
      // 全小程序总览卡
      const overallPct=pct(topSummary.overall_pass_rate||0);
      const perSkillRate=topSummary.per_skill_pass_rate||{};
      const perLines=Object.entries(perSkillRate)
        .map(([name,rate])=>`<div>${h(name)}：<b>${pct(rate)}%</b></div>`).join('');
      document.getElementById('overallCard').style.display='block';
      document.getElementById('overallText').innerHTML=`
        <div>整体通过率：<b style="color:#07C160">${overallPct}%</b>（${allSkills.length} 个 skill · ${topSummary.total_cases||0} 条用例）</div>
        <div style="margin-top:4px;font-size:11px;color:#666">${perLines}</div>`;

      const sel=document.getElementById('skillSelect');
      sel.innerHTML=allSkills.map((s,i)=>`<option value="${i}">${h(s.name)}（${pct(s.summary?.avg_pass_rate||0)}%）</option>`).join('');
      document.getElementById('skillSwitcher').style.display='block';
      sel.addEventListener('change',()=>{
        const s=allSkills[Number(sel.value)];
        start=s.start||{};
        review=s.skill_review?.skill_review||null;
        cases=s.cases||[];
        summary=s.summary||null;
        toolSizeStats=s.explore_tool_size_stats||null;
        apiCoverage=s.api_coverage||null;
        currentSkillName=s.name||currentSkillName;
        // 哨兵值：让随后的 showOverview → renderForCurrentHash 一定跑（cases 已替换，
        // 即便 hash 与目标态都是"空"，仍需重新渲染 overview）。
        currentIdx=-2;
        renderCaseList();
        showOverview();
      });
    }
  }

  // ── 启动 ──
  renderSkillSwitcher();
  renderCaseList();
  // 直接按 URL hash 渲染初始视图：有 #case-N 就开 case，无则总览。
  // 不再走"先 showOverview 再 applyHashFromUrl 修正"那套时序敏感的两步流程。
  renderForCurrentHash();
  window.addEventListener('hashchange', renderForCurrentHash);

  // ── 全局 tooltip：用一个 fixed 元素替代 ::after，避免被 overflow:hidden 裁切 ──
  (function initGlobalTip(){
    let tip=document.getElementById('globalTip');
    if(!tip){
      tip=document.createElement('div');
      tip.id='globalTip';
      document.body.appendChild(tip);
    }
    function show(target){
      const text=target.getAttribute('data-tip');
      if(!text) return;
      tip.textContent=text;
      tip.classList.add('show');
      // 先临时显示以测尺寸
      tip.style.left='0px';tip.style.top='0px';
      const tipRect=tip.getBoundingClientRect();
      const r=target.getBoundingClientRect();
      const vw=window.innerWidth, vh=window.innerHeight;
      let left=r.left + r.width/2 - tipRect.width/2;
      left=Math.max(8, Math.min(left, vw - tipRect.width - 8));
      let top=r.top - tipRect.height - 10;
      let placement='top';
      if(top < 8){ top=r.bottom + 10; placement='bottom'; }
      tip.style.left=left+'px';
      tip.style.top=top+'px';
      // 箭头水平位置（相对 tooltip 左边）
      const arrowX=Math.max(10, Math.min(r.left + r.width/2 - left - 6, tipRect.width - 16));
      tip.style.setProperty('--arrow-x', arrowX+'px');
      tip.classList.remove('tip-top','tip-bottom');
      tip.classList.add(placement==='top'?'tip-top':'tip-bottom');
    }
    function hide(){ tip.classList.remove('show'); }
    document.addEventListener('mouseover',e=>{
      const el=e.target.closest('[data-tip]');
      if(el) show(el);
    });
    document.addEventListener('mouseout',e=>{
      const el=e.target.closest('[data-tip]');
      if(el) hide();
    });
    window.addEventListener('scroll',hide,true);
    window.addEventListener('resize',hide);
  })();

})();
</script>

<!-- 工具定义 Modal -->
<div class="tool-def-modal-overlay" id="toolDefOverlay" onclick="if(event.target===this)closeToolDef()">
  <div class="tool-def-modal">
    <div class="tool-def-modal-header">
      <h3 id="toolDefTitle">接口定义</h3>
      <button class="tool-def-modal-close" onclick="closeToolDef()">&times;</button>
    </div>
    <div class="tool-def-modal-body" id="toolDefBody"></div>
  </div>
</div>

<script>
// ── 工具定义弹窗逻辑 ──
(function(){
  // 构建 toolName → api_doc 索引
  var D=window.__EVAL_DATA__;
  var apiDocs=(D&&D.start&&Array.isArray(D.start.api_docs))?D.start.api_docs:[];
  var apiDocMap={};
  apiDocs.forEach(function(doc){if(doc&&doc.name)apiDocMap[doc.name]=doc;});

  // 构建 skillName → skill_description 索引
  //   - 新 schema：start.skills[] 每项含 { name, skill_description }
  //   - 老 schema：仅顶层 start.skill_description（单 skill 模式）
  // 优先使用 skills[] 精准匹配，兜底用顶层 description
  var skillDescMap={};
  var startSkills=(D&&D.start&&Array.isArray(D.start.skills))?D.start.skills:[];
  startSkills.forEach(function(s){
    if(s&&s.name&&typeof s.skill_description==='string'&&s.skill_description.trim()){
      skillDescMap[s.name]=s.skill_description;
    }
  });
  var fallbackSkillDesc=(D&&D.start&&typeof D.start.skill_description==='string')?D.start.skill_description:'';

  function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  /**
   * 解析该工具所属 skill 的描述 markdown
   *   - 优先 skills[] 中按 doc.skill 命中
   *   - 退化到顶层 skill_description（老 schema 单 skill 时即为该 skill 的完整描述）
   */
  function getSkillDescriptionFor(doc){
    if(doc&&doc.skill&&Object.prototype.hasOwnProperty.call(skillDescMap,doc.skill)){
      return skillDescMap[doc.skill];
    }
    return fallbackSkillDesc||'';
  }

  window.showToolDef=function(toolName){
    var doc=apiDocMap[toolName];
    var overlay=document.getElementById('toolDefOverlay');
    var title=document.getElementById('toolDefTitle');
    var body=document.getElementById('toolDefBody');
    if(!doc){
      title.innerHTML='接口定义 — <strong>'+esc(toolName)+'</strong>';
      body.innerHTML='<p style="color:#999;font-size:13px">未找到该接口的定义信息（可能为内置工具或未注册的接口）。</p>';
      overlay.classList.add('active');
      return;
    }
    title.innerHTML=esc(doc.name)+(doc.skill?'<span class="tool-def-skill-badge">'+esc(doc.skill)+'</span>':'');
    var html='';
    html+='<div class="def-section"><div class="def-section-title">Description</div><div class="def-desc">'+esc(doc.description||'(无描述)')+'</div></div>';
    if(doc.parameters){
      html+='<div class="def-section"><div class="def-section-title">Parameters</div><pre>'+esc(JSON.stringify(doc.parameters,null,2))+'</pre></div>';
    }
    if(doc.output_schema){
      html+='<div class="def-section"><div class="def-section-title">Output Schema</div><pre>'+esc(JSON.stringify(doc.output_schema,null,2))+'</pre></div>';
    }
    // Skill 说明：展示该工具所属 skill 的能力描述（markdown 原文，以等宽 pre 渲染保证缩进/列表对齐）
    var skillMd=getSkillDescriptionFor(doc);
    if(skillMd&&skillMd.trim()){
      var skillLabel=doc.skill?('Skill 说明 · '+esc(doc.skill)):'Skill 说明';
      html+='<div class="def-section"><div class="def-section-title">'+skillLabel+'</div><pre class="def-skill-md">'+esc(skillMd)+'</pre></div>';
    }
    body.innerHTML=html;
    overlay.classList.add('active');
  };

  window.closeToolDef=function(){
    document.getElementById('toolDefOverlay').classList.remove('active');
  };

  // 事件代理：点击任意 .conv-tool-def-btn 弹出对应工具定义
  document.addEventListener('click',function(e){
    var btn=e.target.closest&&e.target.closest('.conv-tool-def-btn');
    if(btn){
      e.preventDefault();
      e.stopPropagation();
      showToolDef(btn.getAttribute('data-tool-name')||'');
    }
  });

  // ESC 关闭
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeToolDef();});
})();
</script>

<div class="tool-detail-modal-overlay" id="toolDetailOverlay" onclick="if(event.target===this)closeToolDetail()">
  <div class="tool-def-modal">
    <div class="tool-def-modal-header" style="background:#e6f7ff">
      <h3 id="toolDetailTitle">调用详情</h3>
      <button class="tool-def-modal-close" onclick="closeToolDetail()">&times;</button>
    </div>
    <div class="tool-def-modal-body" id="toolDetailBody"></div>
  </div>
</div>

<script>
// ── 工具调用详情弹窗逻辑 ──
(function(){
  function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  window.showToolDetail=function(data){
    var overlay=document.getElementById('toolDetailOverlay');
    var title=document.getElementById('toolDetailTitle');
    var body=document.getElementById('toolDetailBody');
    title.innerHTML='调用详情 — <strong>'+esc(data.name)+'</strong>';
    var html='';
    // 请求
    html+='<div class="def-section"><div class="def-section-title">📥 请求'+(data.reqTime?' · '+esc(data.reqTime):'')+'</div><pre>'+esc(data.args||'(无参数)')+'</pre></div>';
    // 响应
    html+='<div class="def-section"><div class="def-section-title">📤 响应'+(data.respTime?' · '+esc(data.respTime):'')+'</div><pre>'+esc(data.response||'(无响应)')+'</pre></div>';
    // structuredContent（非空时）
    if(data.structuredContent){
      html+='<div class="def-section"><div class="def-section-title">🗂 Structured Content</div><pre>'+esc(data.structuredContent)+'</pre></div>';
    }
    body.innerHTML=html;
    overlay.classList.add('active');
  };

  window.closeToolDetail=function(){
    document.getElementById('toolDetailOverlay').classList.remove('active');
  };

  // 事件代理：点击任意 .conv-tool-detail-btn 弹出对应调用详情
  document.addEventListener('click',function(e){
    var btn=e.target.closest&&e.target.closest('.conv-tool-detail-btn');
    if(btn){
      e.preventDefault();
      e.stopPropagation();
      try{
        var data=JSON.parse(btn.getAttribute('data-tool-detail')||'{}');
        showToolDetail(data);
      }catch(err){}
    }
  });

  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeToolDetail();});
})();
</script>
