  // ── 缺陷导出（绑定按钮事件 + 生成 .md / .json）──
  function bindDefectsExport(slotEl, issues){
    const wrap=slotEl.querySelector('.export-defects');
    if(!wrap)return;
    const toggleBtn=wrap.querySelector('[data-action="toggle"]');
    toggleBtn.addEventListener('click',e=>{
      e.stopPropagation();
      // 关闭其它已打开的菜单
      document.querySelectorAll('.export-defects.is-open').forEach(x=>{
        if(x!==wrap)x.classList.remove('is-open');
      });
      wrap.classList.toggle('is-open');
    });
    wrap.querySelectorAll('.export-defects__item').forEach(btn=>{
      btn.addEventListener('click',e=>{
        e.stopPropagation();
        wrap.classList.remove('is-open');
        const fmt=btn.dataset.format;
        if(fmt==='md-fixpack'){
          const fixpackPayload=collectDefectsForFixpackExport(issues);
          if(!fixpackPayload.defects.length)return;
          const skill=fixpackPayload.skill||'skill';
          downloadFile(formatExportFilename(skill,'md','fixpack'), buildDefectsFixpackMarkdown(fixpackPayload), 'text/markdown');
        }
      });
    });
    if(!window.__exportDefectsBound){
      window.__exportDefectsBound=true;
      document.addEventListener('click',()=>{
        document.querySelectorAll('.export-defects.is-open').forEach(x=>x.classList.remove('is-open'));
      });
    }
  }

  // ── 缺陷"修复包"导出（AI Coder 工单版）──
  const FIXPACK_CONTENT_LIMIT=2000;
  const FIXPACK_LEVEL_LOCATION={
    L1:'L1 · 后端接口 / 数据层',
    L2:'L2 · Skill 能力定义',
    L3:'L3 · Skill prompt / 知识配置',
    L4:'L4 · 模型层面'
  };
  const FIXPACK_LEVEL_ORDER=['L1','L2','L3','L4'];

  function truncateContent(s){
    const str=String(s==null?'':s);
    if(str.length<=FIXPACK_CONTENT_LIMIT)return str;
    return str.slice(0,FIXPACK_CONTENT_LIMIT)+`…(truncated, total ${str.length} chars)`;
  }

  function pickFirstUserContent(traj){
    if(!Array.isArray(traj))return '';
    for(const st of traj){
      if(st&&st.role==='user'){
        return typeof st.content==='string'?st.content:JSON.stringify(st.content||'');
      }
    }
    return '';
  }

  function slimTrajectoryStep(st){
    if(!st||typeof st!=='object')return null;
    const out={role:st.role||''};
    if(st.content!=null)out.content=truncateContent(st.content);
    if(st.tool_call_id)out.tool_call_id=st.tool_call_id;
    if(Array.isArray(st.tool_calls)&&st.tool_calls.length){
      out.tool_calls=st.tool_calls.map(tc=>({
        name:tc?.function?.name||tc?.name||'',
        arguments:tc?.function?.arguments||tc?.arguments||''
      }));
    }
    if(st.snapshot_path)out.snapshot_path=st.snapshot_path;
    return out;
  }

  // 把 evidence 区间扩到最近一条 user 边界，并补回中间被跳过的 user 步骤，
  // 让 AI Coder 能看到完整的对话上下文（用户原话/追问）。
  function expandEvidenceWithUser(traj, indices){
    const set=new Set();
    indices.forEach(idx=>{
      const n=Number(idx);
      if(Number.isFinite(n)&&traj[n])set.add(n);
    });
    if(!set.size)return [];
    const arr=[...set];
    const min=Math.min(...arr), max=Math.max(...arr);
    for(let i=min-1;i>=0;i--){
      if(traj[i]&&traj[i].role==='user'){set.add(i);break;}
    }
    for(let i=min;i<=max;i++){
      if(traj[i]&&traj[i].role==='user')set.add(i);
    }
    return [...set].sort((a,b)=>a-b);
  }

  function collectEvidenceSteps(traj, indices){
    if(!Array.isArray(traj)||!Array.isArray(indices)||!indices.length)return [];
    const expanded=expandEvidenceWithUser(traj, indices);
    const result=[];
    expanded.forEach(n=>{
      const slim=slimTrajectoryStep(traj[n]);
      if(slim)result.push({index:n, step:slim});
    });
    return result;
  }

  function readExpectedFromChecklist(c){
    const list=c?.gen_checklist?.checklist;
    if(!Array.isArray(list))return '';
    const lines=[];
    list.forEach((ck,i)=>{
      const pass=ck?.scoring_criteria&&ck.scoring_criteria['1.0'];
      if(pass)lines.push(`${i+1}. ${pass}`);
    });
    return lines.join('\n');
  }

  function collectDefectsForFixpackExport(issues){
    const summary=computeTaskSummary();
    const defects=issues.map(it=>{
      const c=cases[it.caseArrayIdx]||{};
      const traj=c.gen_trajectory?.trajectory||[];
      // case 编号一律用真实 c.idx，与左侧列表 / hash / 任务侧对齐
      const caseIdx=c.idx;
      const evi=Array.isArray(it.evidence_indices)?it.evidence_indices.slice():[];
      return {
        case:{index:caseIdx??null, label:caseIdx!=null?`Case ${caseIdx}`:'Case ?'},
        level:it.level||'',
        level_name:levelName(it.level||''),
        brief:it.brief||'',
        step_index:(typeof it.step_index==='number')?it.step_index:null,
        reason:it.reason||'',
        suggestion:it.suggestion||'',
        not_other_reasons:Array.isArray(it.not_other_reasons)?it.not_other_reasons.slice():[],
        evidence_indices:evi,
        user_prompt:pickFirstUserContent(traj),
        expected_behavior:readExpectedFromChecklist(c),
        evidence_steps:collectEvidenceSteps(traj, evi)
      };
    });
    const byLevel={};
    FIXPACK_LEVEL_ORDER.forEach(lv=>{byLevel[lv]=defects.filter(d=>d.level===lv).length;});
    return {
      skill:parseSkillName(),
      exported_at:new Date().toISOString(),
      evaluated_at:lastFinished(),
      model:llmSummary?.model||'',
      summary:{
        pass_rate:Number((summary.avgRate||0).toFixed(4)),
        total_cases:summary.totalCases||0,
        defect_count:summary.defectCount||0,
        by_level:byLevel
      },
      defects
    };
  }

  // 对可能含 ``` 的原文做转义，避免破坏 Markdown 围栏
  function escapeFenceContent(s){
    return String(s==null?'':s).replace(/```/g,'``\u200b`');
  }

  function renderEvidenceStepsMd(lines, steps){
    if(!steps.length){
      lines.push('（未提供证据步骤）');
      return;
    }
    steps.forEach(({index, step})=>{
      lines.push(`- step #${index} | role=${step.role||'-'}`);
      if(step.tool_call_id)lines.push(`  - tool_call_id: ${step.tool_call_id}`);
      if(step.snapshot_path)lines.push(`  - snapshot: ${step.snapshot_path}`);
      if(step.content){
        lines.push('  - content:');
        lines.push('    ```');
        escapeFenceContent(step.content).split('\n').forEach(l=>lines.push('    '+l));
        lines.push('    ```');
      }
      if(step.tool_calls&&step.tool_calls.length){
        step.tool_calls.forEach(tc=>{
          lines.push(`  - tool_call: ${tc.name||'-'}`);
          if(tc.arguments){
            lines.push('    ```');
            escapeFenceContent(tc.arguments).split('\n').forEach(l=>lines.push('    '+l));
            lines.push('    ```');
          }
        });
      }
    });
  }

  function renderSingleDefectMd(lines, d, idx){
    const head=`### ${idx+1}. ${String(d.brief||'-').replace(/\s*\r?\n+\s*/g,' ').trim()} （${d.case.label}${d.step_index!=null?` · step#${d.step_index}`:''}）`;
    lines.push(head);
    lines.push('');

    lines.push('**📋 用户原话**');
    lines.push('');
    if(d.user_prompt){
      lines.push('```');
      escapeFenceContent(d.user_prompt).split('\n').forEach(l=>lines.push(l));
      lines.push('```');
    }else{
      lines.push('（无）');
    }
    lines.push('');

    lines.push('**🎯 期望行为（Checklist 通过标准）**');
    lines.push('');
    if(d.expected_behavior){
      d.expected_behavior.split('\n').forEach(l=>lines.push(l));
    }else{
      lines.push('（无）');
    }
    lines.push('');

    lines.push('**❌ 实际现象**');
    lines.push('');
    lines.push(d.reason||'（无）');
    lines.push('');

    lines.push('**🔍 证据（Trajectory 片段）**');
    lines.push('');
    renderEvidenceStepsMd(lines, d.evidence_steps);
    lines.push('');

    lines.push('**🧭 级别判定（为什么不是其他层级）**');
    lines.push('');
    if(d.not_other_reasons.length){
      d.not_other_reasons.forEach(r=>{
        if(r&&typeof r==='object'){
          const lv=r.excluded_level||'?';
          const ex=r.explanation||'';
          lines.push(`- **不是 ${lv}**：${ex}`);
        }else{
          lines.push(`- ${r}`);
        }
      });
    }else{
      lines.push('（无）');
    }
    lines.push('');

    lines.push('**🛠️ AI修复建议**');
    lines.push('');
    lines.push(d.suggestion||'（无）');
    lines.push('');

    lines.push('**📍 修复位置**');
    lines.push('');
    lines.push(FIXPACK_LEVEL_LOCATION[d.level]||'-');
    lines.push('');
  }

  function buildDefectsFixpackMarkdown(p){
    const lines=[];
    lines.push(`# ${p.skill} 缺陷修复包`,'');
    lines.push('> 面向 AI Coder 的缺陷工单，每条缺陷含：用户原话 / 期望行为 / 现象 / 证据 / 级别判定 / AI修复建议 / 修复位置。','');
    lines.push(`- Skill：${p.skill||'-'}`);
    lines.push(`- 评测时间：${p.evaluated_at||'-'}`);
    lines.push(`- 导出时间：${p.exported_at||'-'}`);
    if(p.model)lines.push(`- 模型：${p.model}`);
    lines.push(`- 通过率：${Math.round((p.summary.pass_rate||0)*100)}%`);
    lines.push(`- 用例总数：${p.summary.total_cases}`);
    lines.push(`- 缺陷总数：${p.summary.defect_count}`);
    const distParts=FIXPACK_LEVEL_ORDER.filter(lv=>p.summary.by_level[lv]>0).map(lv=>`${lv}: ${p.summary.by_level[lv]}`);
    if(distParts.length)lines.push(`- 按级别分布：${distParts.join('、')}`);
    lines.push('');

    FIXPACK_LEVEL_ORDER.forEach(lv=>{
      const items=p.defects.filter(d=>d.level===lv);
      if(!items.length)return;
      lines.push(`## ${FIXPACK_LEVEL_LOCATION[lv]||lv}`);
      lines.push('');
      items.forEach((d,i)=>renderSingleDefectMd(lines, d, i));
    });

    return lines.join('\n');
  }

  function downloadFile(filename, content, mime){
    const blob=new Blob([content],{type:`${mime};charset=utf-8`});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=filename;a.style.display='none';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},0);
  }

  function formatExportFilename(skill, ext, variant){
    const safeSkill=String(skill||'skill').replace(/[\\/:*?"<>|\s]+/g,'-');
    const d=new Date();
    const pad=n=>String(n).padStart(2,'0');
    const ts=`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}`;
    const tag=variant?`-${variant}`:'';
    return `${safeSkill}-defects${tag}-${ts}.${ext}`;
  }

  // ── 接口成功率 Tab：invokeMethod 调用统计 ──
  function renderApiStats(el){
    if(!apiStats||!apiStats.overall||apiStats.overall.total===0){
      el.innerHTML='<div class="empty" style="padding:20px">暂无 invokeMethod 调用记录</div>';
      return;
    }
    const ov=apiStats.overall;
    const rateColor=v=>v>=0.9?'#07C160':v>=0.6?'#fa8c16':'#f5222d';
    const ovColor=rateColor(ov.successRate);

    // 整体概览卡片
    const r2=32, circ2=2*Math.PI*r2;
    let html=`<div style="display:flex;align-items:center;gap:24px;margin-bottom:24px;padding:16px 20px;background:#fafafa;border-radius:10px;border:1px solid #e5e5e5">
      <div style="position:relative;width:80px;height:80px;flex-shrink:0">
        <svg width="80" height="80" viewBox="0 0 80 80" style="transform:rotate(-90deg)">
          <circle cx="40" cy="40" r="${r2}" fill="none" stroke="#e5e5e5" stroke-width="6"/>
          <circle cx="40" cy="40" r="${r2}" fill="none" stroke="${ovColor}" stroke-width="6"
            stroke-dasharray="${circ2.toFixed(1)}" stroke-dashoffset="${((1-ov.successRate)*circ2).toFixed(1)}"
            stroke-linecap="round"/>
        </svg>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">
          <div style="font-size:18px;font-weight:700;color:${ovColor}">${(ov.successRate*100).toFixed(1)}%</div>
        </div>
      </div>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:600;color:#333;margin-bottom:6px">接口成功率</div>
        <div style="font-size:13px;color:#666;line-height:1.8">
          总调用 <b>${ov.total}</b> 次，成功 <b style="color:#07C160">${ov.success}</b> 次，失败 <b style="color:#f5222d">${ov.failed}</b> 次
        </div>
      </div>
    </div>`;

    // 按工具拆分
    const tools=Object.entries(apiStats.by_tool||{}).sort(([,a],[,b])=>a.successRate-b.successRate);
    if(tools.length){
      html+=`<h4 style="font-size:14px;font-weight:600;margin:16px 0 10px;padding-bottom:8px;border-bottom:1px solid #eee">按工具拆分</h4>`;
      html+=`<table class="perf-table"><thead><tr><th>工具名</th><th class="num">调用次数</th><th class="num">成功</th><th class="num">失败</th><th class="num">成功率</th></tr></thead><tbody>`;
      for(const [name,st] of tools){
        const rc=rateColor(st.successRate);
        html+=`<tr><td><b>${h(name)}</b></td><td class="num">${st.total}</td><td class="num" style="color:#07C160">${st.success}</td><td class="num" style="color:#f5222d">${st.failed}</td><td class="num"><span style="color:${rc};font-weight:600">${(st.successRate*100).toFixed(1)}%</span></td></tr>`;
        if(st.failures&&st.failures.length){
          html+=`<tr><td colspan="5" style="padding:0 0 0 16px;border-top:none"><details style="font-size:11px;cursor:pointer;margin:4px 0 8px"><summary style="color:#1890ff">${st.failures.length} 个失败调用</summary><div style="margin-top:6px;max-height:300px;overflow:auto">`;
          for(const f of st.failures){
            const canJump=Number.isFinite(Number(f.caseIdx))&&Number.isFinite(Number(f.msgIdx));
            const caseHtml=canJump
              ?`<a href="#case-${Number(f.caseIdx)}&traj=${Number(f.msgIdx)}" class="api-failure-case-link" data-case-idx="${Number(f.caseIdx)}" data-traj-idx="${Number(f.msgIdx)}" style="color:#1890ff;text-decoration:none;border-bottom:1px dashed #1890ff">Case ${h(f.caseIdx)} ↗</a>`
              :`<span>Case: ${h(f.caseIdx)}</span>`;
            html+=`<div style="padding:6px 8px;border:1px solid #f0f0f0;border-radius:4px;margin-bottom:4px;background:#fafafa"><div style="display:flex;gap:8px;margin-bottom:4px;font-size:11px;color:#666"><span>Skill: ${h(f.skill)}</span><span>${caseHtml}</span><span style="padding:1px 5px;border-radius:3px;font-size:10px;font-weight:500;${f.errorType==='api_not_found'?'background:#fff3e0;color:#e65100':f.errorType==='invoke_error'?'background:#fbe9e7;color:#c62828':'background:#f5f5f5;color:#666'}">${f.errorType==='api_not_found'?'API未找到':f.errorType==='invoke_error'?'调用失败':'其他'}</span></div><details style="margin:2px 0"><summary style="font-size:10px;color:#999">请求参数</summary><pre style="font-size:10px;background:#f5f5f5;padding:4px;border-radius:3px;max-height:120px;overflow:auto;white-space:pre-wrap;word-break:break-all">${h(JSON.stringify(f.arguments,null,2))}</pre></details><details style="margin:2px 0"><summary style="font-size:10px;color:#999">返回内容</summary><pre style="font-size:10px;background:#f5f5f5;padding:4px;border-radius:3px;max-height:120px;overflow:auto;white-space:pre-wrap;word-break:break-all">${h(f.response?.content||'')}</pre></details></div>`;
          }
          html+=`</div></details></td></tr>`;
        }
      }
      html+=`</tbody></table>`;
    }

    el.innerHTML=html;
  }

  // ── 接口覆盖 Tab：工具调用统计与覆盖率 ──
  function renderApiCoverage(el){
    if(!apiCoverage||!apiCoverage.total_calls){
      el.innerHTML='<div class="empty" style="padding:20px">暂无接口覆盖数据</div>';
      return;
    }
    const cov=apiCoverage;
    const covPct=(cov.coverage*100).toFixed(1);
    const totalCases=cases.length;
    let html='';

    // 覆盖率概览卡片
    const r2=32, circ2=2*Math.PI*r2;
    const covColor=cov.coverage>=0.8?'#07C160':cov.coverage>=0.5?'#fa8c16':'#f5222d';
    html+=`<div style="display:flex;align-items:center;gap:24px;margin-bottom:24px;padding:16px 20px;background:#fafafa;border-radius:10px;border:1px solid #e5e5e5">
      <div style="position:relative;width:80px;height:80px;flex-shrink:0">
        <svg width="80" height="80" viewBox="0 0 80 80" style="transform:rotate(-90deg)">
          <circle cx="40" cy="40" r="${r2}" fill="none" stroke="#e5e5e5" stroke-width="6"/>
          <circle cx="40" cy="40" r="${r2}" fill="none" stroke="${covColor}" stroke-width="6"
            stroke-dasharray="${circ2.toFixed(1)}" stroke-dashoffset="${((1-cov.coverage)*circ2).toFixed(1)}"
            stroke-linecap="round"/>
        </svg>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">
          <div style="font-size:18px;font-weight:700;color:${covColor}">${covPct}%</div>
        </div>
      </div>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:600;color:#333;margin-bottom:6px">接口覆盖率</div>
        <div style="font-size:13px;color:#666;line-height:1.8">
          API 全集 <b>${cov.total_apis}</b> 个，已覆盖 <b style="color:${covColor}">${cov.covered_apis}</b> 个，未覆盖 <b>${cov.uncovered.length}</b> 个<br>
          评测轨迹共 <b>${cov.total_calls}</b> 次工具调用（跨 ${totalCases} 条用例）
        </div>
      </div>
    </div>`;

    // 工具调用统计（合并覆盖 + 性能）
    const tools=Object.entries(cov.tools).map(([name,v])=>({name,...v})).sort((a,b)=>b.calls-a.calls);
    const perfMap=toolSizeStats&&Object.keys(toolSizeStats).length
      ?Object.fromEntries(Object.entries(toolSizeStats).filter(([k])=>k!=='_largest'))
      :{};
    const sizeColor=v=>v>50000?'#f5222d':v>20000?'#fa8c16':'#333';
    const msColor=v=>v>5000?'#f5222d':v>2000?'#fa8c16':'#333';
    const fmtMs=v=>v==null?'-':v;
    if(tools.length){
      html+=`<div class="perf-section"><h3>本次评测覆盖的接口详情</h3><table class="perf-table"><thead><tr><th>接口名</th><th class="num">调用次数</th><th class="num">覆盖用例</th><th class="num">占比</th><th class="num">数据大小<br><small style="font-weight:normal;opacity:.7">最大 / 均值</small></th><th class="num">耗时(ms)<br><small style="font-weight:normal;opacity:.7">最大 / 均值</small></th></tr></thead><tbody>
        ${tools.map(t=>{
          const inAll=cov.total_apis>0&&![...cov.uncovered].includes(t.name);
          const nameStyle=inAll?'':'color:#999;';
          const perf=perfMap[t.name];
          const sizeCell=perf?`<span style="color:${sizeColor(perf.max_bytes||0)}"><b>${fmtNum(perf.max_bytes)}</b></span> / ${fmtNum(perf.avg_bytes)}`:'-';
          const msCell=perf?`<span style="color:${msColor(perf.max_ms||0)}"><b>${fmtMs(perf.max_ms)}</b></span> / ${fmtMs(perf.avg_ms)}`:'-';
          return `<tr><td><b style="${nameStyle}">${h(t.name)}</b>${inAll?'':' <span style="font-size:10px;color:#bbb">(非API全集)</span>'}</td><td class="num"><b>${t.calls}</b></td><td class="num">${t.case_count}/${totalCases}</td><td class="num">${t.pct}%</td><td class="num">${sizeCell}</td><td class="num">${msCell}</td></tr>`;
        }).join('')}
      </tbody></table></div>`;
    }

    // 未覆盖接口列表
    if(cov.uncovered.length){
      html+=`<div class="perf-section"><h3>本次评测未覆盖到的接口（${cov.uncovered.length}）</h3>
        <div style="display:flex;flex-wrap:wrap;gap:6px;padding:4px 0">
          ${cov.uncovered.map(n=>`<span style="display:inline-block;padding:4px 10px;background:#fff1f0;color:#cf1322;border-radius:4px;font-size:12px;border:1px solid #ffa39e">${h(n)}</span>`).join('')}
        </div>
      </div>`;
    }

    el.innerHTML=html;
  }

  // ── 渲染 Case 列表（左侧栏）──
  function renderCaseList(){
    document.getElementById('skillNameLabel').textContent=parseSkillName();
  renderMiniappInfo();
  renderRunSkillsInfo();
    const list=document.getElementById('caseList');
    const sortedIndices=sortedCaseIndices();

    // 渲染**所有** case（含失败/未完成），编号一律用 c.idx —— 与任务侧 case 编号永远对齐。
    // 失败/未完成 case 标 .incomplete（灰色），但仍可点击查看已采集的部分数据；
    // .fail 仅用于"完成评测但有缺陷"的红橙警示，与"流程未跑完"语义不同。
    list.innerHTML=sortedIndices.map(i=>{
      const c=cases[i];
      const isVisible=caseIsVisible(c);
      const attemptsArr=Array.isArray(c.attempts)?c.attempts:[];
      const failedCount=isVisible?caseFailedCount(c):0;
      // K>1：row 是否标红依据"任意 attempt 有失败 checklist"，与下方逐 attempt 徽章口径一致；
      // K=1：沿用 c.view.failed_count（caseFailedCount = attempts[0].view.failed_count）。
      const hasIssue=isVisible && (
        attemptsArr.length>1
          ? attemptsArr.some(a=>{
              const v=a&&a.view;
              return v && v.is_complete && Number(v.failed_count||0)>0;
            })
          : failedCount>0
      );
      const cls=isVisible?(hasIssue?' fail':''):' incomplete';
      const title=c.gen_trajectory?.brief_title||c.gen_intent?.brief_title||(c.gen_intent?.intent||'').slice(0,40)||'';
      const expandTag=caseHasExpand(c)?'<span class="tag-expand">负例-边界测试</span>':'';
      // case-item 右栏：每个 attempt 一格 ✓/✗（按 attempts[n].view.failed_count 判定，
      // 与 case-detail 右栏 checklist 通过情况口径一致）。
      // 流程未跑完的 case（无 view 或 is_complete=false）保持 ⚠ 未完成 单标。
      let rateHtml;
      if(!isVisible){
        rateHtml=`<span class="rate" title="该 case 流程未完整跑完">⚠ 未完成</span>`;
      } else {
        if(attemptsArr.length<=1){
          rateHtml=failedCount>0
            ?`<span class="rate" title="checklist 错 ${failedCount}">✗ ${failedCount}</span>`
            :`<span class="rate" title="checklist 全通过">✓</span>`;
        } else {
          rateHtml='<span class="rate" style="display:inline-flex;gap:3px">'
            +attemptsArr.map(a=>{
              const v=a&&a.view;
              if(!v||!v.is_complete) return `<span title="Attempt ${a.attemptIdx}：未完成" style="color:#bfbfbf">⚠</span>`;
              const fc=Number(v.failed_count||0);
              return fc>0
                ?`<span title="Attempt ${a.attemptIdx}：错 ${fc}" style="color:#fa541c">✗</span>`
                :`<span title="Attempt ${a.attemptIdx}：全通过" style="color:#07C160">✓</span>`;
            }).join('')
            +'</span>';
        }
      }
      return `<div class="case-item${cls}${i===currentIdx?' active':''}" data-idx="${i}">
        <div class="left">
          <span class="dot"></span>
          <span class="label">Case ${c.idx}${title?' · '+h(title):''}${expandTag}</span>
        </div>
        <div class="right">
          ${rateHtml}
        </div>
      </div>`;
    }).join('');

    list.addEventListener('click',e=>{
      const el=e.target.closest('.case-item');
      if(!el)return;
      const i=Number(el.dataset.idx);
      // .active toggle 与右侧渲染由 showCaseDetail → navigateToCase → renderForCurrentHash 统一处理。
      showCaseDetail(i);
    });
  }

  // ── 渲染用例详情（右侧，与任务总览互斥）──
  function renderCaseDetail(){
    const c=cases[currentIdx];
    // Pass@K：先把当前 attempt 的产物镜像到 c 顶层字段，再走原有渲染逻辑
    applyAttemptToCase(c, currentAttemptIdx);
    const evalResult=c.eval?.eval_result||{};
    const attr=c.attribution?.attribution||{};
    const trajectory=c.gen_trajectory?.trajectory||[];
    const checklist=c.gen_checklist?.checklist||[];
    // 仅展示过滤后的 checklist（截断 L4/L2 之后）
    const items=caseVisibleEvalItems(c);
    const attrItems=getVisibleAttrItems(c);
    const failedChecks=caseFailedChecks(c);
    const totalChecks=caseTotalChecks(c);
    const failedCount=caseFailedCount(c);
    const l3Items=[];  // L4 不再展示
    const snapshotPrefix=buildSnapshotPrefix(c.idx, currentAttemptIdx);

    // 构建 evidence_indices -> 失败checklist 的映射
    const failedMerged=failedChecks.map(fc=>{
      const ck=checklist.find(c=>(typeof c.index==='number'?c.index:(checklist.indexOf(c)+1))===fc.step_index)||{};
      return {...fc, evidence:ck.evidence||''};
    });
    // evidence_indices -> 失败 check 列表映射（挂在最后一个 evidence index 上）
    const trajIdxToIssues=new Map();
    failedMerged.forEach(fc=>{
      const indices=fc.evidence_indices||[];
      if(indices.length){
        const lastIdx=indices[indices.length-1];
        if(!trajIdxToIssues.has(lastIdx))trajIdxToIssues.set(lastIdx,[]);
        trajIdxToIssues.get(lastIdx).push(fc);
      }
    });
    // step_index -> attribution 映射
    const stepToAttr=new Map();
    attrItems.forEach(ai=>{stepToAttr.set(ai.step_index,ai)});
    // attribution evidence_indices -> attribution item 映射（挂在最后一个 evidence index 上）
    const trajIdxToAttr=new Map();
    attrItems.forEach(ai=>{
      const indices=ai.evidence_indices||[];
      if(indices.length){
        const lastIdx=indices[indices.length-1];
        if(!trajIdxToAttr.has(lastIdx))trajIdxToAttr.set(lastIdx,[]);
        trajIdxToAttr.get(lastIdx).push(ai);
      }
    });
    // L3 evidence_indices -> 轨迹索引映射（挂在最后一个 evidence index 上）
    const trajIdxToL3=new Map();
    l3Items.forEach(ai=>{
      const indices=ai.evidence_indices||[];
      if(indices.length){
        const lastIdx=indices[indices.length-1];
        if(!trajIdxToL3.has(lastIdx))trajIdxToL3.set(lastIdx,[]);
        trajIdxToL3.get(lastIdx).push(ai);
      }
    });

    // 详情区编号一律用 c.idx —— 与任务侧 / 左侧列表 / hash (#case-N) 三处对齐
    const caseTitle=c.gen_trajectory?.brief_title||c.gen_intent?.brief_title||(c.gen_intent?.intent||'').slice(0,40)||'';
    const expandTagDetail=caseHasExpand(c)?'<span class="tag-expand">负例-边界测试</span>':'';
    // 不完整 case 在标题区用文字标记，让用户立即知道为什么没有评分/归因
    const incompleteTag=!caseIsVisible(c)
      ?'<span class="tag-expand" style="background:#f0f0f0;color:#8c8c8c;border-color:#d9d9d9">⚠ 未完成</span>'
      :'';

    let html=`
      <div class="case-detail-header">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="back-btn" id="backToOverview">← 返回总览</button>
          <h2>Case ${c.idx}${caseTitle?' · '+h(caseTitle):''}${expandTagDetail}${incompleteTag}</h2>
        </div>
        <div style="display:flex;align-items:center;gap:8px;font-size:12px">
          ${(()=>{
            // Pass@K：K>1 时显示 pass@k 徽章 + Attempt 选择器；K=1（含历史任务）退化为 checklist 通过/错误徽章
            const pk = casePassK(c);
            const attempts = Array.isArray(c.attempts)?c.attempts:[];
            const k = pk?.k ?? attempts.length ?? 1;
            if (k > 1) {
              const passCount = pk?.pass_count ?? 0;
              const passRate = pk?.pass_rate ?? 0;
              const ratePct = Math.round(passRate * 100);
              const okStyle = passCount === k
                ? 'background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f'
                : passCount === 0
                  ? 'background:#fff2e8;color:#fa541c;border:1px solid #ffbb96'
                  : 'background:#fff7e6;color:#fa8c16;border:1px solid #ffd591';
              // 合并 c.attempts 与 pass_k.attempts：
              //   - c.attempts 是磁盘真相，含完整 view
              //   - pass_k.attempts 可能含 c.attempts 没有的 missing 条目（attempt 跑失败/被 skip）
              // 用 attemptIdx 合并，保证选择器条目数与 pass@k 分母一致。
              const optEntries = new Map();
              attempts.forEach(a => optEntries.set(Number(a.attemptIdx), { attempt: a, passEntry: null }));
              (pk?.attempts ?? []).forEach(pa => {
                const idx = Number(pa?.attemptIdx);
                if (!Number.isFinite(idx)) return;
                const existing = optEntries.get(idx);
                if (existing) existing.passEntry = pa;
                else optEntries.set(idx, { attempt: null, passEntry: pa });
              });
              const sortedIdxs = [...optEntries.keys()].sort((a,b)=>a-b);
              const opts = sortedIdxs.map(idx => {
                const { attempt: a, passEntry: pa } = optEntries.get(idx);
                const v = a && a.view;
                // 与 pass@k 计数口径一致：✓ = 全 checklist 通过；✗ = 有失败 / 流程未完成 /
                // attempt 缺失（pass_k 都按未通过计入 K 分母）。tooltip 区分语义。
                let mark, tip;
                if (!a || (pa && pa.missing)) {
                  mark = '✗';
                  tip = `Attempt ${idx}：未跑完（计入 pass@k 失败）`;
                } else if (!v || !v.is_complete) {
                  mark = '✗';
                  tip = `Attempt ${idx}：流程未完整跑完（计入 pass@k 失败）`;
                } else {
                  const fc = Number(v.failed_count || 0);
                  if (fc > 0) {
                    mark = '✗';
                    tip = `Attempt ${idx}：checklist 错 ${fc}`;
                  } else {
                    mark = '✓';
                    tip = `Attempt ${idx}：全通过`;
                  }
                }
                return `<option value="${idx}" ${idx===currentAttemptIdx?'selected':''} title="${tip}">Attempt ${idx} ${mark}</option>`;
              }).join('');
              return `<span style="padding:3px 10px;border-radius:12px;font-weight:600;${okStyle}" title="pass@${k} = ${passCount}/${k}（一条轨迹的全部 checklist 都通过才计为通过）">pass@${k}: ${passCount}/${k} (${ratePct}%)</span>
                <select id="attemptSelector" style="padding:3px 8px;border-radius:6px;border:1px solid #d9d9d9;font-size:12px;cursor:pointer">${opts}</select>`;
            }
            // K=1：保留原 checklist 徽章语义
            return `<span style="padding:3px 10px;border-radius:12px;font-weight:600;${failedCount>0?'background:#fff2e8;color:#fa541c;border:1px solid #ffbb96':'background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f'}">
              ${failedCount>0?`✗ checklist 错误 ${failedCount}/${totalChecks}`:`✓ checklist 全通过（${totalChecks}）`}
            </span>`;
          })()}
        </div>
      </div>
      <div class="case-detail-body">
        <div class="case-col-eval">`;

    // Pass@K：从 header 下沉到 body 顶部 —— 工具调用计数 / skill 分布 + checklist 通过情况（K>1 时显示）
    if (caseAttemptCount(c) > 1 || casePassK(c)) {
      const dist = c.tool_calls_by_skill;
      const distHtml = (()=>{
        if (!dist || !dist.total) return '';
        const skills = Array.isArray(dist.unique_skills)?dist.unique_skills:[];
        const parts = Object.entries(dist.counts||{}).filter(([k])=>k!=='__unknown__').map(([k,v])=>`${h(k)} ${v}`).join(' · ');
        const tip = parts || '无';
        return `<span style="padding:3px 10px;border-radius:12px;background:#f0f5ff;color:#2f54eb;border:1px solid #adc6ff" title="${h(tip)}">🔧 ${dist.total} 次 · ${skills.length} 个 skill</span>`;
      })();
      const checklistHtml = `<span style="padding:3px 10px;border-radius:12px;font-weight:600;${failedCount>0?'background:#fff2e8;color:#fa541c;border:1px solid #ffbb96':'background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f'}">
        ${failedCount>0?`✗ checklist 错误 ${failedCount}/${totalChecks}`:`✓ checklist 全通过（${totalChecks}）`}
      </span>`;
      html += `<div style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:12px">
        <span style="color:#8c8c8c">本 attempt：</span>
        ${distHtml}
        ${checklistHtml}
      </div>`;
    }

    // Debug 模式：呈现 intent 信息
    if(c.view?.debug){
      const intentStr=c.gen_intent?.intent||'';
      const isExpand=caseHasExpand(c);
      const expandEnts=isExpand?caseExpandedEntities(c):[];
      if(intentStr){
        html+=`<div style="margin-bottom:12px;padding:12px 16px;background:#e6f7ff;border:1px solid #91d5ff;border-radius:8px">
          <h4 style="font-size:13px;font-weight:600;color:#1890ff;margin:0 0 6px 0">🔍 Intent（Debug）</h4>
          <div style="font-size:12px;color:#333;line-height:1.6;white-space:pre-wrap">${h(intentStr)}</div>`;
        if(isExpand&&expandEnts.length){
          html+=`<div style="margin-top:8px;padding-top:8px;border-top:1px dashed #91d5ff">
            <span style="font-size:12px;font-weight:600;color:#fa541c">⚠️ 边界实体：</span>
            <span style="font-size:12px;color:#fa541c">${expandEnts.map(e=>'「'+h(e.identifier||'?')+'」('+h(e.type||'?')+')').join('、')}</span>
          </div>`;
        }
        html+=`</div>`;
      }
    }

    // Skill 缺陷
    if(attrItems.length){
      html+=`<div class="attr-summary-bar"><h4>⚠️ Skill 缺陷（${attrItems.length}）</h4><div class="attr-summary-list">`;
      attrItems.forEach((ai,aiIdx)=>{
        const stepIdx=ai.step_index;
        const titleText=h(ai.brief||ai.description||'');
        const titleHtml=stepIdx!=null
          ?`<a href="javascript:void(0)" onclick="var el=document.getElementById('attr-step-${stepIdx}');if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.boxShadow='0 0 0 3px #ff9500';el.style.borderColor='#ff9500';setTimeout(()=>{el.style.boxShadow='';el.style.borderColor='#f0f0f0'},2500)}" style="font-size:13px;font-weight:600;color:#1890ff;text-decoration:none;cursor:pointer;border-bottom:1px dashed #1890ff">${titleText} ↗</a>`
          :`<span style="font-size:13px;font-weight:600;color:#333">${titleText}</span>`;
        html+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid #f0f0f0;border-radius:8px;margin-bottom:8px">
          <span class="attr-badge ${h(ai.level)}" data-tip="${h(levelDesc(ai.level))}" style="cursor:help">${levelName(ai.level)}</span>
          ${titleHtml}
        </div>`;
      });
      html+=`</div></div>`;
    }

    if(!attrItems.length){
      html+=`<div style="margin-bottom:16px;padding:12px 16px;background:#f6ffed;border:1px solid #b7eb8f;border-radius:8px">
        <h4 style="font-size:13px;font-weight:600;color:#52c41a;margin:0">✅ Skill 缺陷（0）</h4>
      </div>`;
    }

    // 申诉结果（如存在）
    const appealView=c.view?.appeal;
    if(appealView && appealView.has_appeal){
      const appealEvalItems=appealView.eval_items||[];
      const appealAttrItems=appealView.attr_items||[];
      const passedCount=appealView.passed_count||0;
      const totalCount=appealView.total_count||0;
      const appealTime=appealView.appeal_time?new Date(appealView.appeal_time).toLocaleString('zh-CN'):'';
      html+=`<div style="margin-bottom:16px;padding:12px 16px;background:#f0f5ff;border:1px solid #adc6ff;border-radius:8px">`;
      html+=`<h4 style="font-size:13px;font-weight:600;color:#2f54eb;margin:0 0 8px 0">📝 申诉结果（${passedCount}/${totalCount} 项通过）</h4>`;
      if(appealTime){
        html+=`<div style="font-size:11px;color:#8c8c8c;margin-bottom:6px">申诉时间：${h(appealTime)}${appealView.appeal_model?' · 模型：'+h(appealView.appeal_model):''}</div>`;
      }
      html+=`<div style="font-size:12px;color:#595959;margin-bottom:10px;padding:8px;background:#fff;border-radius:6px;border:1px solid #e8e8e8"><strong>申诉理由：</strong>${h(appealView.appeal_content)}</div>`;
      // 申诉后的 checklist 评测结果
      if(appealEvalItems.length){
        html+=`<div class="attr-summary-list" style="margin-bottom:8px">`;
        appealEvalItems.forEach(ei=>{
          const passed=(ei.score??0)>=(ei.max_score??1);
          const icon=passed?'✅':'❌';
          const color=passed?'#52c41a':'#ff4d4f';
          html+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:#fff;border:1px solid #f0f0f0;border-radius:6px;margin-bottom:4px">
            <span style="color:${color};font-size:14px">${icon}</span>
            <span style="font-size:12px;color:#333;flex:1">${h(ei.description||'步骤 '+ei.step_index)}</span>
            <span style="font-size:11px;color:#8c8c8c">${ei.score}/${ei.max_score}</span>
          </div>`;
          if(ei.reason){
            html+=`<div style="font-size:11px;color:#8c8c8c;padding:2px 10px 4px 30px">${h(ei.reason)}</div>`;
          }
        });
        html+=`</div>`;
      }
      // 申诉后的归因结果
      if(appealAttrItems.length){
        html+=`<div style="margin-top:8px"><div style="font-size:12px;font-weight:600;color:#595959;margin-bottom:4px">归因调整：</div><div class="attr-summary-list">`;
        appealAttrItems.forEach(ai=>{
          html+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:#fff;border:1px solid #f0f0f0;border-radius:6px;margin-bottom:4px">
            <span class="attr-badge ${h(ai.level)}">${levelName(ai.level)}</span>
            <span style="font-size:12px;color:#333">${h(ai.brief||ai.reason||'')}</span>
          </div>`;
        });
        html+=`</div></div>`;
      }
      html+=`</div>`;
    }

    // Checklist 列表（过滤后）
    html+=renderChecklistSection(c, items, checklist);

    // 关闭左列，插入拖动分割条，打开右列
    html+=`</div><div class="split-handle" id="splitHandle"></div><div class="case-col-traj">`;

    // 轨迹主体：对内报告（debug）用 conv-list，对外报告用 chat-flow
    const isDebugMode=!!c.view?.debug;
    const renderedStepIndices=new Set();
    if(!trajectory.length){
      html+='<div class="empty">暂无对话轨迹</div>';
    } else {
      html+=isDebugMode?'<div class="conv-list">':'<div class="chat-flow">';
      const rendered=new Set();
      const callStatusByKey=new Map();
      (c.view?.call_statuses||[]).forEach(cs=>{
        callStatusByKey.set(`${cs.msgIdx}:${cs.tcIdx}`,{status:cs.status,reason:cs.reason||''});
      });
      const renderCallStatusBadge=(mi,tcIdx)=>{
        const cs=callStatusByKey.get(`${mi}:${tcIdx}`);
        if(!cs) return '';
        if(cs.status==='ok'){
          return `<span class="conv-call-ok-badge" title="工具调用：成功">工具调用：成功</span>`;
        }
        const reason=h(String(cs.reason||cs.status).replace(/\s+/g,' ').trim());
        return `<span class="conv-call-fail-badge" title="${reason}">工具调用：失败</span>`;
      };
      let pendingToolCalls=null;
      trajectory.forEach((msg,mi)=>{
        if(rendered.has(mi)) return;
        const role=msg.role||'unknown';

        // 对外报告：遇到非 assistant 消息时，先 flush 挂起的 tool_calls
        if(pendingToolCalls && !isDebugMode){
          const isNextAssistant=role==='assistant' && !msg.partial;
          if(!isNextAssistant){
            html+=`<div class="chat-msg chat-assistant" style="flex-direction:column;align-items:flex-start;gap:4px">
              ${pendingToolCalls.mergedAnchors}
              <div class="chat-bubble asst-bbl has-tools" data-target="${pendingToolCalls.expandId}">
                <div class="chat-text">⚡ 工具调用</div>
              </div>
              ${pendingToolCalls.snapshotHtml}
              <div class="chat-tool-calls" id="${pendingToolCalls.expandId}">${pendingToolCalls.toolCallsHtml}${pendingToolCalls.inlineAttr}</div>
            </div>`;
            pendingToolCalls=null;
          }
        }

        // ── assistant with tool_calls ──
        if(msg.tool_calls&&msg.tool_calls.length){
          const mergedIndices=[];
          if(isDebugMode){
            // ── 对内：conv-item + conv-tool-box ──
            let body='';
            if(msg.content) body+=`<div class="conv-text">${h(msg.content)}</div>`;
            msg.tool_calls.forEach((tc,tcIdx)=>{
              const fn=tc.function||tc;
              const callId=tc.id||'';
              let toolResp=null, toolRespIdx=null;
              for(let j=mi+1;j<trajectory.length&&j<=mi+10;j++){
                if(trajectory[j].role==='tool'&&(trajectory[j].tool_call_id===callId||(!callId&&trajectory[j].role==='tool'))){
                  toolResp=trajectory[j]; toolRespIdx=j; rendered.add(j); break;
                }
              }
              if(!toolResp){
                for(let j=mi+1;j<trajectory.length;j++){
                  if(trajectory[j].role==='tool'&&!rendered.has(j)){
                    toolResp=trajectory[j]; toolRespIdx=j; rendered.add(j); break;
                  }
                }
              }
              if(toolRespIdx!=null) mergedIndices.push(toolRespIdx);
              const args=fn.arguments||'';
              const respContent=toolResp?(typeof toolResp.content==='string'?toolResp.content:JSON.stringify(toolResp.content,null,2)):'';
              const respFull=(!isEmptyStructuredContent(toolResp?.structuredContent))?(typeof toolResp.structuredContent==='string'?toolResp.structuredContent:JSON.stringify(toolResp.structuredContent,null,2)):'';
              const argsP=jsonPretty(args);
              const respP=jsonPretty(respContent);
              const isErr=toolResp?.isError;
              const tsStr=fmtTs(msg.ts||toolResp?.ts);
              const detailData=JSON.stringify({name:fn.name||'',reqTime:fmtTs(msg.ts),args:argsP||args,respTime:fmtTs(toolResp?.ts),response:respContent,structuredContent:respFull}).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
              body+=`<div class="conv-tool-box${isErr?' tool-error':''}">
                <div class="conv-tool-box-header">⚡ 调用接口 <strong>${h(fn.name||'')}</strong><button class="conv-tool-def-btn" data-tool-name="${h(fn.name||'')}">📖 定义</button><button class="conv-tool-detail-btn" data-tool-detail="${detailData}">📋 详情</button>${renderCallStatusBadge(mi,tcIdx)}${isErr?'<span class="conv-tool-error-badge">返回结果: Error</span>':'<span class="conv-tool-success-badge">返回结果: Success</span>'}${tsStr?`<span class="conv-tool-time">🕐 ${tsStr}</span>`:''}</div>
                ${renderToolSection('📥 输入参数',argsP)}
                ${renderToolSection('📤 输出参数',respP)}
                ${(toolResp?.snapshot_data_url||toolResp?.snapshot_path)?`<img class="conv-snapshot" src="${h(toolResp.snapshot_data_url||snapshotPrefix+toolResp.snapshot_path)}" alt="快照" onerror="this.outerHTML='<span class=&quot;conv-snapshot-fallback&quot;>截图缺失</span>'">`:''}
                ${toolResp?.element_tree?`<details class="conv-etree"><summary>元素树</summary><pre>${h(toolResp.element_tree)}</pre></details>`:''}
              </div>`;
            });
            let inlineAttr=renderInlineChecklist(mi,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices);
            mergedIndices.forEach(idx=>{
              inlineAttr+=renderInlineChecklist(idx,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices);
            });
            const nextIdx=mi+msg.tool_calls.length+1;
            if(!inlineAttr && nextIdx<trajectory.length && !rendered.has(nextIdx)){
              inlineAttr=renderInlineChecklist(nextIdx,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices);
            }
            const mergedAnchors=mergedIndices.map(idx=>`<span id="traj-${idx}"></span>`).join('');
            html+=`<div class="conv-item role-tool" id="traj-${mi}">
              ${mergedAnchors}
              <div class="conv-role tool">Tool Call <span style="color:#ccc;font-size:10px;font-weight:400">#${mi}</span></div>
              ${body}
              ${inlineAttr}
            </div>`;
          } else {
            // ── 对外：assistant 气泡 + 右侧小箭头展开工具调用 ──
            let toolCallsHtml='';
            let snapshotHtml='';
            const toolNames=[];
            msg.tool_calls.forEach((tc,tcIdx)=>{
              const fn=tc.function||tc;
              const callId=tc.id||'';
              toolNames.push(fn.name||'');
              let toolResp=null, toolRespIdx=null;
              for(let j=mi+1;j<trajectory.length&&j<=mi+10;j++){
                if(trajectory[j].role==='tool'&&(trajectory[j].tool_call_id===callId||(!callId&&trajectory[j].role==='tool'))){
                  toolResp=trajectory[j]; toolRespIdx=j; rendered.add(j); break;
                }
              }
              if(!toolResp){
                for(let j=mi+1;j<trajectory.length;j++){
                  if(trajectory[j].role==='tool'&&!rendered.has(j)){
                    toolResp=trajectory[j]; toolRespIdx=j; rendered.add(j); break;
                  }
                }
              }
              if(toolRespIdx!=null) mergedIndices.push(toolRespIdx);
              const args=fn.arguments||'';
              const respContent=toolResp?(typeof toolResp.content==='string'?toolResp.content:JSON.stringify(toolResp.content,null,2)):'';
              const respFull=(!isEmptyStructuredContent(toolResp?.structuredContent))?(typeof toolResp.structuredContent==='string'?toolResp.structuredContent:JSON.stringify(toolResp.structuredContent,null,2)):'';
              const argsP=jsonPretty(args);
              const respP=jsonPretty(respContent);
              const isErr=toolResp?.isError;
              const tsStr=fmtTs(msg.ts||toolResp?.ts);
              const detailData=JSON.stringify({name:fn.name||'',reqTime:fmtTs(msg.ts),args:argsP||args,respTime:fmtTs(toolResp?.ts),response:respContent,structuredContent:respFull}).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
              toolCallsHtml+=`<details class="tool-call-panel${isErr?' tool-error':''}">
                <summary class="tool-call-summary">
                  <span class="tool-call-arrow">▶</span>
                  <span class="tool-call-name">⚡ ${h(fn.name||'')}</span>
                  ${renderCallStatusBadge(mi,tcIdx)}
                  ${isErr?'<span class="conv-tool-error-badge">Error</span>':'<span class="conv-tool-success-badge">Success</span>'}
                  ${tsStr?`<span class="tool-call-time">🕐 ${tsStr}</span>`:''}
                  <button class="conv-tool-def-btn" data-tool-name="${h(fn.name||'')}">📖</button>
                  <button class="conv-tool-detail-btn" data-tool-detail="${detailData}">📋</button>
                </summary>
                <div class="tool-call-detail">
                  ${renderToolSection('📥 输入参数',argsP)}
                  ${renderToolSection('📤 输出参数',respP)}
                  ${(toolResp?.snapshot_data_url||toolResp?.snapshot_path)?`<img class="conv-snapshot" src="${h(toolResp.snapshot_data_url||snapshotPrefix+toolResp.snapshot_path)}" alt="快照" onerror="this.outerHTML='<span class=&quot;conv-snapshot-fallback&quot;>截图缺失</span>'">`:''}
                  ${toolResp?.element_tree?`<details class="conv-etree"><summary>元素树</summary><pre>${h(toolResp.element_tree)}</pre></details>`:''}
                </div>
              </details>`;
              // 收集卡片截图，用于在气泡下方直接渲染
              if(toolResp?.snapshot_data_url||toolResp?.snapshot_path){
                snapshotHtml+=`<img class="chat-snapshot" src="${h(toolResp.snapshot_data_url||snapshotPrefix+toolResp.snapshot_path)}" alt="快照" onerror="this.outerHTML='<span class=&quot;conv-snapshot-fallback&quot;>截图缺失</span>'">`;
              }
            });
            let inlineAttr=renderInlineChecklist(mi,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices);
            mergedIndices.forEach(idx=>{
              inlineAttr+=renderInlineChecklist(idx,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices);
            });
            const nextIdx=mi+msg.tool_calls.length+1;
            if(!inlineAttr && nextIdx<trajectory.length && !rendered.has(nextIdx)){
              inlineAttr+=renderInlineChecklist(nextIdx,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices);
            }
            const mergedAnchors=mergedIndices.map(idx=>`<span id="traj-${idx}"></span>`).join('');
            const toolCount=msg.tool_calls.length;
            const expandId='tool-expand-'+mi;
            if(msg.content){
              if(pendingToolCalls){
                html+=`<div class="chat-msg chat-assistant" id="traj-${mi}" style="flex-direction:column;align-items:flex-start;gap:4px">
                  ${pendingToolCalls.mergedAnchors}${mergedAnchors}
                  <div class="chat-bubble asst-bbl has-tools" data-target="${pendingToolCalls.expandId}">
                    <div class="chat-text">${h(msg.content)}</div>
                  </div>
                  ${pendingToolCalls.snapshotHtml}${snapshotHtml}
                  <div class="chat-tool-calls" id="${pendingToolCalls.expandId}">${pendingToolCalls.toolCallsHtml}${toolCallsHtml}${pendingToolCalls.inlineAttr}${inlineAttr}</div>
                </div>`;
                pendingToolCalls=null;
              } else {
                html+=`<div class="chat-msg chat-assistant" id="traj-${mi}" style="flex-direction:column;align-items:flex-start;gap:4px">
                  ${mergedAnchors}
                  <div class="chat-bubble asst-bbl has-tools" data-target="${expandId}">
                    <div class="chat-text">${h(msg.content)}</div>
                  </div>
                  ${snapshotHtml}
                  <div class="chat-tool-calls" id="${expandId}">${toolCallsHtml}${inlineAttr}</div>
                </div>`;
              }
            } else {
              if(pendingToolCalls){
                pendingToolCalls.toolCallsHtml+=toolCallsHtml;
                pendingToolCalls.inlineAttr+=inlineAttr;
                pendingToolCalls.mergedAnchors+=mergedAnchors;
                pendingToolCalls.snapshotHtml+=snapshotHtml;
              } else {
                pendingToolCalls={expandId, toolCallsHtml, inlineAttr, mergedAnchors, snapshotHtml};
              }
            }
          }
          return;
        }

        // ── independent tool response ──
        if(role==='tool'){
          const isErr=msg.isError;
          if(isDebugMode){
            // ── 对内 ──
            let body='';
            if(isErr) body+=`<div class="conv-tool-error-badge" style="margin-bottom:6px">返回结果: Error</div>`;
            else body+=`<div class="conv-tool-success-badge" style="margin-bottom:6px">返回结果: Success</div>`;
            if(!isEmptyStructuredContent(msg.structuredContent)){
              const smry=typeof msg.content==='string'?msg.content:JSON.stringify(msg.content,null,2);
              const full=typeof msg.structuredContent==='string'?msg.structuredContent:JSON.stringify(msg.structuredContent,null,2);
              body+=`<div class="conv-text">${h(smry)}</div>
                <details class="tool-full-output"><summary>查看完整输出</summary><pre class="tool-raw">${h(full)}</pre></details>`;
            } else {
              const content=typeof msg.content==='string'?msg.content:JSON.stringify(msg.content,null,2);
              body+=`<div class="conv-text">${renderContent(content)}</div>`;
            }
            if(msg.snapshot_data_url||msg.snapshot_path){
              const src=msg.snapshot_data_url||snapshotPrefix+msg.snapshot_path;
              body+=`<img class="conv-snapshot" src="${h(src)}" alt="快照" onerror="this.outerHTML='<span class=&quot;conv-snapshot-fallback&quot;>截图缺失</span>'">`;
            }
            if(msg.element_tree){
              body+=`<details class="conv-etree"><summary>元素树</summary><pre>${h(msg.element_tree)}</pre></details>`;
            }
            html+=`<div class="conv-item role-tool${isErr?' tool-error-item':''}" id="traj-${mi}" ${isErr?'style="border-left:3px solid #ff4d4f"':''}>
              <div class="conv-role tool">tool${msg.tool_call_id?' (response)':''} <span style="color:#ccc;font-size:10px;font-weight:400">#${mi}</span></div>
              ${body}
              ${renderInlineChecklist(mi,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices)}
            </div>`;
          } else {
            // ── 对外：独立工具响应，默认隐藏，点击展开 ──
            let detailHtml='';
            if(!isEmptyStructuredContent(msg.structuredContent)){
              const smry=typeof msg.content==='string'?msg.content:JSON.stringify(msg.content,null,2);
              const full=typeof msg.structuredContent==='string'?msg.structuredContent:JSON.stringify(msg.structuredContent,null,2);
              detailHtml=`<div class="chat-text" style="color:#333">${h(smry)}</div>
                <details class="conv-etree" style="margin-top:6px"><summary>查看完整输出</summary><pre>${h(full)}</pre></details>`;
            } else {
              const content=typeof msg.content==='string'?msg.content:JSON.stringify(msg.content,null,2);
              detailHtml=`<div class="chat-text" style="color:#333">${renderContent(content)}</div>`;
            }
            if(msg.snapshot_data_url||msg.snapshot_path){
              detailHtml+=`<img class="conv-snapshot" src="${h(msg.snapshot_data_url||snapshotPrefix+msg.snapshot_path)}" alt="快照" onerror="this.outerHTML='<span class=&quot;conv-snapshot-fallback&quot;>截图缺失</span>'">`;
            }
            if(msg.element_tree){
              detailHtml+=`<details class="conv-etree"><summary>元素树</summary><pre>${h(msg.element_tree)}</pre></details>`;
            }
            const toolExpandId='tool-expand-'+mi;
            const indSnapshot=(msg.snapshot_data_url||msg.snapshot_path)?`<img class="chat-snapshot" src="${h(msg.snapshot_data_url||snapshotPrefix+msg.snapshot_path)}" alt="快照" onerror="this.outerHTML='<span class=&quot;conv-snapshot-fallback&quot;>截图缺失</span>'">`:'';
            html+=`<div class="chat-msg chat-assistant" id="traj-${mi}" style="flex-direction:column;align-items:flex-start;gap:4px">
              <div class="chat-bubble asst-bbl has-tools" data-target="${toolExpandId}">
                <div class="chat-text">${isErr?'❌':'⚡'} tool response</div>
              </div>
              ${indSnapshot}
              <div class="chat-tool-calls" id="${toolExpandId}">
                <details class="tool-call-panel${isErr?' tool-error':''}"${isErr?' open':''}>
                  <summary class="tool-call-summary">
                    <span class="tool-call-arrow">▶</span>
                    <span class="tool-call-name">⚡ tool response</span>
                    ${isErr?'<span class="conv-tool-error-badge">Error</span>':'<span class="conv-tool-success-badge">Success</span>'}
                  </summary>
                  <div class="tool-call-detail">${detailHtml}</div>
                </details>
                ${renderInlineChecklist(mi,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices)}
              </div>
            </div>`;
          }
          return;
        }

        // ── assistant (no tool_calls) ──
        if(role==='assistant'){
          const content=typeof msg.content==='string'?msg.content:JSON.stringify(msg.content,null,2);
          if(msg.partial){
            const m=msg.partial_meta||{};
            const reason=m.reason||'timeout';
            const tm=m.timeout_ms?` · ${m.timeout_ms}ms`:'';
            const stat=`已收集事件: tool=${m.peek_tool_count||0} · resp=${m.peek_response_chars||0}字 · raw=${m.peek_raw_events||0}`;
            if(isDebugMode){
              html+=`<div class="conv-item role-assistant role-partial" id="traj-${mi}">
                <div class="conv-role assistant" style="color:#fa8c16">⚠️ Agent 超时(partial) <span style="color:#ccc;font-size:10px;font-weight:400">#${mi}</span></div>
                <div class="conv-text" style="color:#fa8c16">${h(reason)}${h(tm)}</div>
                <div class="conv-text" style="color:#999;font-size:11px;margin-top:4px">${h(stat)}</div>
                <div class="conv-text" style="color:#bfbfbf;font-size:11px;margin-top:2px">${h(content)}</div>
                ${renderInlineChecklist(mi,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices)}
              </div>`;
            } else {
              html+=`<div class="chat-msg chat-assistant" id="traj-${mi}">
                <div class="chat-bubble asst-bbl partial">
                  <div class="chat-text" style="color:#fa8c16">⚠️ Agent 超时 ${h(reason)}${h(tm)}</div>
                  <div class="chat-text" style="color:#999;font-size:11px;margin-top:4px">${h(stat)}</div>
                  <div class="chat-text" style="color:#bfbfbf;font-size:11px;margin-top:2px">${h(content)}</div>
                  ${renderInlineChecklist(mi,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices)}
                </div>
              </div>`;
            }
            return;
          }
          if(isDebugMode){
            let body=`<div class="conv-text">${renderContent(content)}</div>`;
            html+=`<div class="conv-item role-assistant" id="traj-${mi}">
              <div class="conv-role assistant">Assistant <span style="color:#ccc;font-size:10px;font-weight:400">#${mi}</span></div>
              ${body}
              ${renderInlineChecklist(mi,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices)}
            </div>`;
          } else {
            if(pendingToolCalls){
              html+=`<div class="chat-msg chat-assistant" id="traj-${mi}" style="flex-direction:column;align-items:flex-start;gap:4px">
                ${pendingToolCalls.mergedAnchors}
                <div class="chat-bubble asst-bbl has-tools" data-target="${pendingToolCalls.expandId}">
                  <div class="chat-text">${renderContent(content)}</div>
                </div>
                ${pendingToolCalls.snapshotHtml}
                <div class="chat-tool-calls" id="${pendingToolCalls.expandId}">${pendingToolCalls.toolCallsHtml}${pendingToolCalls.inlineAttr}</div>
              </div>`;
              pendingToolCalls=null;
            } else {
              html+=`<div class="chat-msg chat-assistant" id="traj-${mi}">
                <div class="chat-bubble asst-bbl">
                  <div class="chat-text">${renderContent(content)}</div>
                  ${renderInlineChecklist(mi,trajIdxToIssues,trajIdxToL3,trajIdxToAttr,stepToAttr,checklist,items,l3Items,renderedStepIndices)}
                </div>
              </div>`;
            }
          }
          return;
        }

        // ── user ──
        const content=typeof msg.content==='string'?msg.content:JSON.stringify(msg.content,null,2);
        // 对外报告跳过空内容的 user 消息（避免操作卡片后产生空气泡）
        if(!isDebugMode && !String(content||'').trim()) return;
        if(isDebugMode){
          let body=`<div class="conv-text">${renderContent(content)}</div>`;
          const avatarSvg=`<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>`;
          html+=`<div class="conv-item role-user" id="traj-${mi}">
            <div class="conv-avatar">${avatarSvg}</div>
            <div class="conv-body">
              <div class="conv-role user">User <span style="color:#ccc;font-size:10px;font-weight:400">#${mi}</span></div>
              ${body}
            </div>
          </div>`;
        } else {
          html+=`<div class="chat-msg chat-user" id="traj-${mi}">
            <div class="chat-bubble user-bbl">
              <div class="chat-text">${renderContent(content)}</div>
            </div>
          </div>`;
        }
      });
      // 循环结束：flush 剩余未合并的 tool_calls
      if(pendingToolCalls && !isDebugMode){
        html+=`<div class="chat-msg chat-assistant" style="flex-direction:column;align-items:flex-start;gap:4px">
          ${pendingToolCalls.mergedAnchors}
          <div class="chat-bubble asst-bbl has-tools" data-target="${pendingToolCalls.expandId}">
            <div class="chat-text">⚡ 工具调用</div>
          </div>
          ${pendingToolCalls.snapshotHtml}
          <div class="chat-tool-calls" id="${pendingToolCalls.expandId}">${pendingToolCalls.toolCallsHtml}${pendingToolCalls.inlineAttr}</div>
        </div>`;
        pendingToolCalls=null;
      }
      html+='</div>';
    }

    // 关闭右列和 body 容器
    html+=`</div></div>`;

    document.getElementById('caseDetail').innerHTML=html;

    // 返回总览按钮
    document.getElementById('backToOverview').addEventListener('click',()=>showOverview());

    // Pass@K：attempt 选择器（K>1 时存在）切换 → 重新渲染本 case 详情
    const attemptSelector = document.getElementById('attemptSelector');
    if (attemptSelector) {
      attemptSelector.addEventListener('change', (e) => {
        const next = Number(e.target.value);
        if (Number.isFinite(next) && next > 0 && next !== currentAttemptIdx) {
          currentAttemptIdx = next;
          // 同步 hash（便于分享 / 跨页面状态保留）
          try {
            const idxNum = c.idx;
            location.hash = `#case-${idxNum}/attempt-${next}`;
          } catch { /* ignore */ }
          renderCaseDetail();
        }
      });
    }

    // ── 拖动分割条逻辑 ──
    const splitHandle=document.getElementById('splitHandle');
    if(splitHandle){
      const body=splitHandle.parentElement;
      const evalCol=body.querySelector('.case-col-eval');
      let startX,startW;
      const onMouseMove=(e)=>{
        const dx=e.clientX-startX;
        const newW=Math.min(Math.max(startW+dx,200),body.clientWidth*0.7);
        evalCol.style.width=newW+'px';
      };
      const onMouseUp=()=>{
        splitHandle.classList.remove('dragging');
        document.removeEventListener('mousemove',onMouseMove);
        document.removeEventListener('mouseup',onMouseUp);
        document.body.style.cursor='';
        document.body.style.userSelect='';
      };
      splitHandle.addEventListener('mousedown',(e)=>{
        e.preventDefault();
        startX=e.clientX;
        startW=evalCol.offsetWidth;
        splitHandle.classList.add('dragging');
        document.body.style.cursor='col-resize';
        document.body.style.userSelect='none';
        document.addEventListener('mousemove',onMouseMove);
        document.addEventListener('mouseup',onMouseUp);
      });
    }
  }

  function scoreTag(score,max){
    if(score==null) return '<span class="score-tag">-</span>';
    const cls=score>=max?'full':score>0?'half':'zero';
    return `<span class="score-tag ${cls}">${score}/${max}</span>`;
  }

  // ── 左侧栏：小程序信息 + skill 接口列表 ──
  function renderMiniappInfo(){
    const box=document.getElementById('miniappInfo');
    if(!box) return;
    const project=D.project||{};
    // 小程序名称：优先 project.miniapp_name → start.adapter_config.miniapp_name → project_name → 未知
    const miniappName=project.miniapp_name||start.adapter_config?.miniapp_name||start.miniapp_name||project.project_name||start.project_name||'未知小程序';
    const appId=project.appid||start.adapter_config?.appid||start.appid||'';
    const skillPkgName=parseSkillName();
    // 接口列表：从 start.api_docs 取真实 API 名（这才是用户视角下的 skill 能力，如 searchCity / getCurrentWeather）
    const apiDocs=Array.isArray(start.api_docs)?start.api_docs:[];
    const apis=apiDocs.map(a=>({
      name:a.name||'',
      desc:a.description||''
    })).filter(a=>a.name);
    const apisHtml=apis.length
      ? apis.map(a=>`<div class="mi-skill-item" title="${h(a.desc||a.name)}">
          <span class="mi-skill-dot"></span>
          <span class="mi-skill-name">${h(a.name)}</span>
        </div>`).join('')
      : `<div class="mi-skill-item" style="color:#999"><span class="mi-skill-name">暂无接口信息</span></div>`;
    box.innerHTML=`
      <div class="mi-row">
        <span class="mi-label">小程序：</span>
        <span class="mi-val">${h(miniappName)}</span>
      </div>
      ${appId?`<div class="mi-row">
        <span class="mi-label">AppID：</span>
        <span class="mi-val mi-mono" title="${h(appId)}">${h(appId)}</span>
      </div>`:''}
      ${skillPkgName?``:''}
      <div class="mi-skills">
        <div class="mi-skills-title" onclick="this.nextElementSibling.classList.toggle('collapsed');this.querySelector('.mi-toggle').classList.toggle('collapsed')">
          <span>本次评测 Skill（${apis.length}）</span>
          <span class="mi-toggle collapsed">▼</span>
        </div>
        <div class="mi-skill-list collapsed">${apisHtml}</div>
      </div>`;
  }

  // ── multi-skill run 总览：参与 skills / 排除 skills / 跨 skill case 数 ──
  function renderRunSkillsInfo(){
    const box=document.getElementById('runSkillsInfo');
    if(!box) return;
    const run=D.run||{};
    const participating=Array.isArray(run.participating_skills)?run.participating_skills:[];
    if(participating.length<=1) return; // 单 skill 不展示
    const excluded=Array.isArray(run.excluded_skills)?run.excluded_skills:[];
    const breakdown=run.skill_breakdown||{};
    const perCalls=breakdown.per_skill_calls||{};
    const callsHtml=participating.map(name=>{
      const cnt=perCalls[name]||0;
      return `<span class="mi-skill-item"><span class="mi-skill-dot"></span><span class="mi-skill-name">${h(name)}</span><span style="color:#666;font-size:11px">${cnt} 次</span></span>`;
    }).join('');
    const excludedHtml=excluded.length
      ? `<div class="mi-row"><span class="mi-label">已剔除：</span><span class="mi-val" style="color:#fa541c">${excluded.map(h).join('、')}</span></div>`
      : '';
    const cross=breakdown.cross_skill_cases||0;
    const total=breakdown.total_cases||0;
    box.style.display='block';
    box.innerHTML=`
      <div class="mi-row"><span class="mi-label">参与 Skills：</span><span class="mi-val">${participating.length} 个</span></div>
      <div class="mi-row"><span class="mi-label">跨 Skill 调用 case：</span><span class="mi-val">${cross}/${total}</span></div>
      ${excludedHtml}
      <div class="mi-skills">
        <div class="mi-skills-title"><span>各 Skill 工具调用</span></div>
        <div class="mi-skill-list" style="flex-direction:row;flex-wrap:wrap;gap:6px">${callsHtml}</div>
      </div>`;
  }

  // ── 多 skill 切换 ──
  function renderSkillSwitcher(){
    const allSkills=Array.isArray(D.skills)?D.skills:[];
    const topSummary=D.summary||{};
    if(allSkills.length>1){
      // 全小程序总览卡
      const overallPct=pct(topSummary.overall_pass_rate||0);
      const perSkillRate=topSummary.per_skill_pass_rate||{};
      const perLines=Object.entries(perSkillRate)
        .map(([name,rate])=>`<div>${h(name)}：<b>${pct(rate)}%</b></div>`).join('');
      document.getElementById('overallCard').style.display='block';
      document.getElementById('overallText').innerHTML=`
        <div>整体通过率：<b style="color:#07C160">${overallPct}%</b>（${allSkills.length} 个 skill · ${topSummary.total_cases||0} 条用例）</div>
        <div style="margin-top:4px;font-size:11px;color:#666">${perLines}</div>`;

      const sel=document.getElementById('skillSelect');
      sel.innerHTML=allSkills.map((s,i)=>`<option value="${i}">${h(s.name)}（${pct(s.summary?.avg_pass_rate||0)}%）</option>`).join('');
      document.getElementById('skillSwitcher').style.display='block';
      sel.addEventListener('change',()=>{
        const s=allSkills[Number(sel.value)];
        start=s.start||{};
        review=s.skill_review?.skill_review||null;
        cases=s.cases||[];
        summary=s.summary||null;
        toolSizeStats=s.explore_tool_size_stats||null;
        apiCoverage=s.api_coverage||null;
        currentSkillName=s.name||currentSkillName;
        // 哨兵值：让随后的 showOverview → renderForCurrentHash 一定跑（cases 已替换，
        // 即便 hash 与目标态都是"空"，仍需重新渲染 overview）。
        currentIdx=-2;
        renderCaseList();
        showOverview();
      });
    }
  }

  // ── 启动 ──
  renderSkillSwitcher();
  renderCaseList();
  // 直接按 URL hash 渲染初始视图：有 #case-N 就开 case，无则总览。
  // 不再走"先 showOverview 再 applyHashFromUrl 修正"那套时序敏感的两步流程。
  renderForCurrentHash();
  window.addEventListener('hashchange', renderForCurrentHash);

  // ── 全局 tooltip：用一个 fixed 元素替代 ::after，避免被 overflow:hidden 裁切 ──
  (function initGlobalTip(){
    let tip=document.getElementById('globalTip');
    if(!tip){
      tip=document.createElement('div');
      tip.id='globalTip';
      document.body.appendChild(tip);
    }
    function show(target){
      const text=target.getAttribute('data-tip');
      if(!text) return;
      tip.textContent=text;
      tip.classList.add('show');
      // 先临时显示以测尺寸
      tip.style.left='0px';tip.style.top='0px';
      const tipRect=tip.getBoundingClientRect();
      const r=target.getBoundingClientRect();
      const vw=window.innerWidth, vh=window.innerHeight;
      let left=r.left + r.width/2 - tipRect.width/2;
      left=Math.max(8, Math.min(left, vw - tipRect.width - 8));
      let top=r.top - tipRect.height - 10;
      let placement='top';
      if(top < 8){ top=r.bottom + 10; placement='bottom'; }
      tip.style.left=left+'px';
      tip.style.top=top+'px';
      // 箭头水平位置（相对 tooltip 左边）
      const arrowX=Math.max(10, Math.min(r.left + r.width/2 - left - 6, tipRect.width - 16));
      tip.style.setProperty('--arrow-x', arrowX+'px');
      tip.classList.remove('tip-top','tip-bottom');
      tip.classList.add(placement==='top'?'tip-top':'tip-bottom');
    }
    function hide(){ tip.classList.remove('show'); }
    document.addEventListener('mouseover',e=>{
      const el=e.target.closest('[data-tip]');
      if(el) show(el);
    });
    document.addEventListener('mouseout',e=>{
      const el=e.target.closest('[data-tip]');
      if(el) hide();
    });
    window.addEventListener('scroll',hide,true);
    window.addEventListener('resize',hide);
  })();

})();
</script>

<!-- 工具定义 Modal -->
<div class="tool-def-modal-overlay" id="toolDefOverlay" onclick="if(event.target===this)closeToolDef()">
  <div class="tool-def-modal">
    <div class="tool-def-modal-header">
      <h3 id="toolDefTitle">接口定义</h3>
      <button class="tool-def-modal-close" onclick="closeToolDef()">&times;</button>
    </div>
    <div class="tool-def-modal-body" id="toolDefBody"></div>
  </div>
</div>

<script>
// ── 工具定义弹窗逻辑 ──
(function(){
  // 构建 toolName → api_doc 索引
  var D=window.__EVAL_DATA__;
  var apiDocs=(D&&D.start&&Array.isArray(D.start.api_docs))?D.start.api_docs:[];
  var apiDocMap={};
  apiDocs.forEach(function(doc){if(doc&&doc.name)apiDocMap[doc.name]=doc;});

  // 构建 skillName → skill_description 索引
  //   - 新 schema：start.skills[] 每项含 { name, skill_description }
  //   - 老 schema：仅顶层 start.skill_description（单 skill 模式）
  // 优先使用 skills[] 精准匹配，兜底用顶层 description
  var skillDescMap={};
  var startSkills=(D&&D.start&&Array.isArray(D.start.skills))?D.start.skills:[];
  startSkills.forEach(function(s){
    if(s&&s.name&&typeof s.skill_description==='string'&&s.skill_description.trim()){
      skillDescMap[s.name]=s.skill_description;
    }
  });
  var fallbackSkillDesc=(D&&D.start&&typeof D.start.skill_description==='string')?D.start.skill_description:'';

  function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  /**
   * 解析该工具所属 skill 的描述 markdown
   *   - 优先 skills[] 中按 doc.skill 命中
   *   - 退化到顶层 skill_description（老 schema 单 skill 时即为该 skill 的完整描述）
   */
  function getSkillDescriptionFor(doc){
    if(doc&&doc.skill&&Object.prototype.hasOwnProperty.call(skillDescMap,doc.skill)){
      return skillDescMap[doc.skill];
    }
    return fallbackSkillDesc||'';
  }

  window.showToolDef=function(toolName){
    var doc=apiDocMap[toolName];
    var overlay=document.getElementById('toolDefOverlay');
    var title=document.getElementById('toolDefTitle');
    var body=document.getElementById('toolDefBody');
    if(!doc){
      title.innerHTML='接口定义 — <strong>'+esc(toolName)+'</strong>';
      body.innerHTML='<p style="color:#999;font-size:13px">未找到该接口的定义信息（可能为内置工具或未注册的接口）。</p>';
      overlay.classList.add('active');
      return;
    }
    title.innerHTML=esc(doc.name)+(doc.skill?'<span class="tool-def-skill-badge">'+esc(doc.skill)+'</span>':'');
    var html='';
    html+='<div class="def-section"><div class="def-section-title">Description</div><div class="def-desc">'+esc(doc.description||'(无描述)')+'</div></div>';
    if(doc.parameters){
      html+='<div class="def-section"><div class="def-section-title">Parameters</div><pre>'+esc(JSON.stringify(doc.parameters,null,2))+'</pre></div>';
    }
    if(doc.output_schema){
      html+='<div class="def-section"><div class="def-section-title">Output Schema</div><pre>'+esc(JSON.stringify(doc.output_schema,null,2))+'</pre></div>';
    }
    // Skill 说明：展示该工具所属 skill 的能力描述（markdown 原文，以等宽 pre 渲染保证缩进/列表对齐）
    var skillMd=getSkillDescriptionFor(doc);
    if(skillMd&&skillMd.trim()){
      var skillLabel=doc.skill?('Skill 说明 · '+esc(doc.skill)):'Skill 说明';
      html+='<div class="def-section"><div class="def-section-title">'+skillLabel+'</div><pre class="def-skill-md">'+esc(skillMd)+'</pre></div>';
    }
    body.innerHTML=html;
    overlay.classList.add('active');
  };

  window.closeToolDef=function(){
    document.getElementById('toolDefOverlay').classList.remove('active');
  };

  // 事件代理：点击任意 .conv-tool-def-btn 弹出对应工具定义
  document.addEventListener('click',function(e){
    var btn=e.target.closest&&e.target.closest('.conv-tool-def-btn');
    if(btn){
      e.preventDefault();
      e.stopPropagation();
      showToolDef(btn.getAttribute('data-tool-name')||'');
    }
  });

  // ESC 关闭
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeToolDef();});
})();
</script>

<div class="tool-detail-modal-overlay" id="toolDetailOverlay" onclick="if(event.target===this)closeToolDetail()">
  <div class="tool-def-modal">
    <div class="tool-def-modal-header" style="background:#e6f7ff">
      <h3 id="toolDetailTitle">调用详情</h3>
      <button class="tool-def-modal-close" onclick="closeToolDetail()">&times;</button>
    </div>
    <div class="tool-def-modal-body" id="toolDetailBody"></div>
  </div>
</div>

<script>
// ── 工具调用详情弹窗逻辑 ──
(function(){
  function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  window.showToolDetail=function(data){
    var overlay=document.getElementById('toolDetailOverlay');
    var title=document.getElementById('toolDetailTitle');
    var body=document.getElementById('toolDetailBody');
    title.innerHTML='调用详情 — <strong>'+esc(data.name)+'</strong>';
    var html='';
    // 请求
    html+='<div class="def-section"><div class="def-section-title">📥 请求'+(data.reqTime?' · '+esc(data.reqTime):'')+'</div><pre>'+esc(data.args||'(无参数)')+'</pre></div>';
    // 响应
    html+='<div class="def-section"><div class="def-section-title">📤 响应'+(data.respTime?' · '+esc(data.respTime):'')+'</div><pre>'+esc(data.response||'(无响应)')+'</pre></div>';
    // structuredContent（非空时）
    if(data.structuredContent){
      html+='<div class="def-section"><div class="def-section-title">🗂 Structured Content</div><pre>'+esc(data.structuredContent)+'</pre></div>';
    }
    body.innerHTML=html;
    overlay.classList.add('active');
  };

  window.closeToolDetail=function(){
    document.getElementById('toolDetailOverlay').classList.remove('active');
  };

  // 事件代理：点击任意 .conv-tool-detail-btn 弹出对应调用详情
  document.addEventListener('click',function(e){
    var btn=e.target.closest&&e.target.closest('.conv-tool-detail-btn');
    if(btn){
      e.preventDefault();
      e.stopPropagation();
      try{
        var data=JSON.parse(btn.getAttribute('data-tool-detail')||'{}');
        showToolDetail(data);
      }catch(err){}
    }
    // 对外报告：点击 assistant 气泡展开/收起工具调用面板
    var bubble=e.target.closest&&e.target.closest('.chat-bubble.asst-bbl.has-tools');
    if(bubble){
      var targetId=bubble.getAttribute('data-target');
      var targetEl=targetId&&document.getElementById(targetId);
      if(targetEl){
        var isExpanded=targetEl.classList.contains('expanded');
        targetEl.classList.toggle('expanded',!isExpanded);
      }
    }
  });

  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeToolDetail();});
})();
</script>
